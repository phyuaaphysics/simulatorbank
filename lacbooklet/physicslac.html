<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics of Refraction | Luxury Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255, 255, 255, 0.7);
            --ios-blue: #007aff;
        }
        body {
            /* 設置鑽石背景圖 */
            background-image: url('https://phyuaaphysics.github.io/simulatorbank/lacbooklet/diamond.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1c1c1e;
            letter-spacing: -0.01em;
            overflow-x: hidden;
            min-h-screen;
        }
        /* 增加遮罩讓背景圖不會過於刺眼，保持文字可讀性 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(242, 242, 247, 0.4);
            z-index: -1;
        }
        .luxury-heading {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }
        .glass-card {
            background: var(--ios-card);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .word-span {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 6px;
            padding: 2px 4px;
            margin: 0 -2px;
            display: inline-block;
            font-weight: 400;
            position: relative;
        }
        .word-span:hover {
            background-color: rgba(0, 122, 255, 0.15);
            color: var(--ios-blue);
        }
        .highlight {
            background-color: var(--ios-blue) !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        .btn-ios {
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        .btn-ios:active {
            transform: scale(0.92);
            opacity: 0.7;
        }

        /* Floating Popover Styles */
        #floatingPopover {
            position: absolute;
            z-index: 100;
            width: 280px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.2));
            background: rgba(255, 255, 255, 0.9);
        }
        #floatingPopover.active {
            pointer-events: auto;
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .popover-arrow {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body class="pb-20" onclick="handleOutsideClick(event)">

    <div class="max-w-3xl mx-auto px-6 pt-12 md:pt-20">
        <header class="mb-16 text-center">
            <h1 class="luxury-heading text-5xl md:text-6xl text-slate-900 mb-4 italic drop-shadow-sm">Physics of Refraction</h1>
            <div class="flex items-center justify-center gap-2 text-slate-600 font-bold tracking-widest uppercase text-[10px]">
                <span class="w-8 h-[1px] bg-slate-400"></span>
                Educational Series
                <span class="w-8 h-[1px] bg-slate-400"></span>
            </div>
        </header>

        <main class="flex flex-col gap-12" id="passageContainer">
            <!-- Sections injected by JS -->
        </main>
    </div>

    <!-- Floating Popover -->
    <div id="floatingPopover" class="rounded-2xl p-6 border border-white/50 backdrop-blur-xl">
        <div class="space-y-4">
            <h3 id="popoverWord" class="luxury-heading text-2xl text-slate-900 border-b border-slate-100 pb-2"></h3>
            <div class="space-y-3">
                <div>
                    <span class="text-[9px] font-bold text-blue-500 uppercase block mb-1 tracking-wider">English</span>
                    <p id="popoverEn" class="text-slate-600 text-sm leading-relaxed italic"></p>
                </div>
                <div>
                    <span class="text-[9px] font-bold text-slate-400 uppercase block mb-1 tracking-wider">繁體中文</span>
                    <p id="popoverZh" class="text-slate-800 text-base leading-relaxed font-medium"></p>
                </div>
            </div>
        </div>
        <div class="popover-arrow"></div>
    </div>

    <script>
        const apiKey = "";
        const sections = [
            {
                text: "When light moves from one medium to another, it changes speed and direction slightly, this phenomenon is called refraction.",
                audio: "https://phyuaaphysics.github.io/simulatorbank/lacbooklet/physics_section_1.wav"
            },
            {
                text: "Camera lenses and other optical lenses work by refracting light rays. They bend and focus light to form clear images on the camera sensor or film. The unique curvatures and materials of each lens element control how much light refracts as it passes through, allowing sharp photos and videos. Refraction is a core technology behind modern digital and smartphone photography.",
                audio: "https://phyuaaphysics.github.io/simulatorbank/lacbooklet/physics_section_2.wav"
            },
            {
                text: "Have you ever wondered how those thin glass strands called fiber optic cables can carry bright lights through them? They use a neat trick with light called total internal reflection.",
                audio: "https://phyuaaphysics.github.io/simulatorbank/lacbooklet/physics_section_3.wav"
            },
            {
                text: "When light hits the boundary between two different materials, it usually goes through. But if it hits at a steep enough angle, called the critical angle, the light bounces back completely. It doesn't go through because the second material won't let it in. Pretty sneaky, right? This total reflection lets the fiber optic cables carry light signals for miles without much dimming. It's also why diamonds sparkle so brightly - the light gets trapped inside. When you see fiber optics in phones or the shiny facets on jewelry, you'll know why they can manipulate light so well. The special reflection makes photons zip around without escaping. Pretty cool how some clever physics creates such magical glowing effects!",
                audio: "https://phyuaaphysics.github.io/simulatorbank/lacbooklet/physics_section_4.wav"
            }
        ];

        let currentAudio = null;
        let activePlayingId = null;

        const container = document.getElementById('passageContainer');
        const popover = document.getElementById('floatingPopover');

        function initApp() {
            container.innerHTML = sections.map((section, idx) => {
                const words = section.text.split(/\s+/).map(word => {
                    const cleanWord = word.replace(/[\[\]\(\)\,\.\!\?]/g, '').replace(/'/g, "\\'");
                    return `<span class="word-span" onclick="handleWordClick(event, this, '${cleanWord}')">${word}</span>`;
                }).join(' ');

                return `
                <div class="passage-section glass-card rounded-[2.5rem] p-10 relative overflow-hidden">
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex items-baseline gap-2">
                            <span class="luxury-heading text-4xl text-slate-800/20">0${idx + 1}</span>
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Section</span>
                        </div>
                        <div class="flex gap-3">
                            <button id="play-${idx}" onclick="playSection(event, ${idx})" class="btn-ios bg-white/60 hover:bg-white text-slate-900 border border-white/50 shadow-sm px-6 py-2.5 rounded-full flex items-center gap-2 text-xs font-semibold">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Play Audio
                            </button>
                            <button id="stop-${idx}" onclick="stopAudio(event)" class="hidden btn-ios bg-slate-900 text-white px-6 py-2.5 rounded-full flex items-center gap-2 text-xs font-semibold">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></svg>
                                Stop
                            </button>
                        </div>
                    </div>
                    <div class="text-slate-900 leading-[1.9] text-xl font-light select-none tracking-tight">${words}</div>
                </div>
                `;
            }).join('');
        }

        async function handleWordClick(event, el, word) {
            event.stopPropagation();
            
            document.querySelectorAll('.word-span').forEach(w => w.classList.remove('highlight'));
            el.classList.add('highlight');

            const rect = el.getBoundingClientRect();
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            const popoverWidth = 280;
            const popoverHeight = 180; 
            
            let targetLeft = rect.left + scrollLeft + (rect.width / 2) - (popoverWidth / 2);
            let targetTop = rect.top + scrollTop - popoverHeight - 15;
            
            if (targetLeft < 10) targetLeft = 10;
            if (targetLeft + popoverWidth > window.innerWidth - 10) targetLeft = window.innerWidth - popoverWidth - 10;
            if (targetTop < 10) targetTop = rect.bottom + scrollTop + 15;

            popover.style.left = `${targetLeft}px`;
            popover.style.top = `${targetTop}px`;

            document.getElementById('popoverWord').innerText = word;
            document.getElementById('popoverEn').innerText = "Consulting lexicon...";
            document.getElementById('popoverZh').innerText = "正在檢索詞典...";
            popover.classList.add('active');

            try {
                const prompt = `Define the word "${word}" elegantly for a student. 
                Provide the response in JSON format with two keys: "en" (English definition) and "zh" (Traditional Chinese definition). 
                Keep both definitions concise but high-quality.`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await res.json();
                const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                
                document.getElementById('popoverEn').innerText = result.en || "Definition unavailable.";
                document.getElementById('popoverZh').innerText = result.zh || "暫無定義。";
            } catch (err) {
                document.getElementById('popoverEn').innerText = "An error occurred.";
                document.getElementById('popoverZh').innerText = "發生錯誤。";
            }
        }

        function handleOutsideClick(event) {
            if (!popover.contains(event.target)) {
                popover.classList.remove('active');
                document.querySelectorAll('.word-span').forEach(w => w.classList.remove('highlight'));
            }
        }

        function stopAudio(event) {
            if (event) event.stopPropagation();
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (activePlayingId !== null) {
                const playBtn = document.getElementById(`play-${activePlayingId}`);
                const stopBtn = document.getElementById(`stop-${activePlayingId}`);
                if (playBtn) playBtn.classList.remove('hidden');
                if (stopBtn) stopBtn.classList.add('hidden');
                activePlayingId = null;
            }
        }

        function playSection(event, idx) {
            event.stopPropagation();
            stopAudio();
            const btn = document.getElementById(`play-${idx}`);
            const stopBtn = document.getElementById(`stop-${idx}`);
            
            currentAudio = new Audio(sections[idx].audio);
            activePlayingId = idx;

            currentAudio.onplay = () => {
                if (btn) btn.classList.add('hidden');
                if (stopBtn) stopBtn.classList.remove('hidden');
            };
            
            currentAudio.onended = stopAudio;
            currentAudio.onerror = () => stopAudio();
            currentAudio.play();
        }

        window.onload = initApp;
    </script>
</body>
</html>
