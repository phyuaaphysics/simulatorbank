<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理模擬：箭矢與香蕉的重力下墜 (進階互動版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #064e3b;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #bae6fd 0%, #e0f2fe 100%);
            touch-action: none;
        }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            border: 4px solid #0369a1;
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto;
        }
        .formula-card {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #ef4444;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <h1 class="text-xl font-bold text-blue-900 mb-2">🏹 拋體運動實驗 (參數自定義)</h1>
    <p class="text-xs text-gray-600 mb-4">觀察箭矢如何隨時間偏離直線並擊中香蕉。你可以調整場景布局。</p>
    
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700">發射初速率 (v₀): <span id="v-val">30</span> m/s</label>
            <input type="range" id="velocity-slider" min="10" max="60" value="30" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700">樹木高度 (h): <span id="h-val">6</span> m</label>
            <input type="range" id="height-slider" min="2" max="10" step="0.5" value="6" class="w-full h-2 bg-green-200 rounded-lg appearance-none cursor-pointer">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700">發射距離 (d): <span id="d-val">15</span> m</label>
            <input type="range" id="dist-slider" min="5" max="25" step="0.5" value="15" class="w-full h-2 bg-purple-200 rounded-lg appearance-none cursor-pointer">
        </div>
        
        <div class="p-2 bg-gray-100 rounded text-[11px] text-gray-700 leading-tight">
            重力加速度 (g) = <b>9.81 m/s²</b><br>
            比例尺：50 像素 = 1 公尺
        </div>

        <div class="flex space-x-2">
            <button id="fire-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full btn">
                🏹 發射
            </button>
            <button id="reset-btn" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-full btn">
                🔄 重設
            </button>
        </div>
    </div>
</div>

<div class="formula-card">
    <div class="text-sm font-bold text-red-600 mb-1">下墜公式：s = ½gt²</div>
    <hr class="my-2 border-gray-300">
    <div class="text-xs space-y-1">
        <div>時間 (t): <span id="stats-t">0.00</span> s</div>
        <div class="text-blue-600">箭偏移 (s₁): <span id="stats-s1">0.00</span> m</div>
        <div class="text-yellow-600">香蕉位移 (s₂): <span id="stats-s2">0.00</span> m</div>
    </div>
</div>

<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    const vValDisp = document.getElementById('v-val');
    const hValDisp = document.getElementById('h-val');
    const dValDisp = document.getElementById('d-val');
    const statsT = document.getElementById('stats-t');
    const statsS1 = document.getElementById('stats-s1');
    const statsS2 = document.getElementById('stats-s2');

    let width, height;
    let isRunning = false;
    let isHit = false; 
    let time = 0;
    
    const G = 9.81;
    const PX_PER_METER = 50; 
    
    let hunter = { x: 100, y: 0 }; 
    let monkey = { x: 0, y: 0, height_m: 6, dist_m: 15 }; 
    let banana = { x: 0, y: 0, startX: 0, startY: 0, trail: [] };
    let arrow = { x: 0, y: 0, trail: [] };
    
    let v0 = 30; 
    let angle = 0;
    
    const timeStep = 0.002; 

    // UI Listeners
    document.getElementById('velocity-slider').addEventListener('input', (e) => {
        v0 = parseInt(e.target.value);
        vValDisp.innerText = v0;
        updateAim();
    });
    document.getElementById('height-slider').addEventListener('input', (e) => {
        monkey.height_m = parseFloat(e.target.value);
        hValDisp.innerText = monkey.height_m;
        resize();
    });
    document.getElementById('dist-slider').addEventListener('input', (e) => {
        monkey.dist_m = parseFloat(e.target.value);
        dValDisp.innerText = monkey.dist_m;
        resize();
    });

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        hunter.y = height - 100; 
        
        if (!isRunning && !isHit) {
            monkey.x = hunter.x + (monkey.dist_m * PX_PER_METER);
            monkey.y = hunter.y - (monkey.height_m * PX_PER_METER);
            updateAim();
        }
    }

    function updateAim() {
        if (isRunning || isHit) return;
        const bX = monkey.x + 10;
        const bY = monkey.y + 30; 
        const dx = bX - hunter.x;
        const dy = bY - hunter.y;
        angle = Math.atan2(dy, dx);
        
        banana.startX = bX;
        banana.startY = bY;
        banana.x = bX;
        banana.y = bY;
        banana.trail = [];
        arrow.trail = [];
    }

    function drawGrid() {
        ctx.save();
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.lineWidth = 1;
        for (let y = hunter.y; y > 0; y -= PX_PER_METER) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
        }
        for (let x = 0; x < width; x += PX_PER_METER) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
        }
        ctx.restore();
    }

    function drawScenery() {
        drawGrid();
        ctx.fillStyle = '#3f6212';
        ctx.fillRect(0, hunter.y, width, height - hunter.y);
        
        // 畫發射點標記 (發射器)
        ctx.save();
        ctx.translate(hunter.x, hunter.y);
        ctx.rotate(angle);
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, 20, Math.PI * 0.8, Math.PI * 1.2, true);
        ctx.stroke();
        ctx.fillStyle = '#475569';
        ctx.fillRect(-5, -2, 30, 4);
        ctx.restore();

        // 畫樹
        ctx.fillStyle = '#78350f';
        ctx.fillRect(monkey.x - 10, monkey.y, 20, hunter.y - monkey.y);
        ctx.fillStyle = '#166534';
        ctx.beginPath();
        ctx.arc(monkey.x, monkey.y, 60, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawArrow() {
        if (!isRunning && !isHit) return;
        ctx.save();
        ctx.translate(arrow.x, arrow.y);
        const vx = v0 * Math.cos(angle);
        const vy = v0 * Math.sin(angle) + G * time;
        ctx.rotate(Math.atan2(vy, vx));
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke();
        ctx.fillStyle = '#ef4444'; ctx.fillRect(-15, -3, 6, 6);
        ctx.restore();
    }

    function update() {
        if (isRunning) {
            time += timeStep;
            const drop_m = 0.5 * G * time * time;
            const drop_px = drop_m * PX_PER_METER;
            
            banana.y = banana.startY + drop_px;
            banana.trail.push({x: banana.x, y: banana.y});

            arrow.x = hunter.x + (v0 * Math.cos(angle) * PX_PER_METER) * time;
            arrow.y = hunter.y + (v0 * Math.sin(angle) * PX_PER_METER) * time + drop_px;
            arrow.trail.push({x: arrow.x, y: arrow.y});

            statsT.innerText = time.toFixed(2);
            statsS1.innerText = drop_m.toFixed(2);
            statsS2.innerText = drop_m.toFixed(2);

            const dist = Math.hypot(arrow.x - banana.x, arrow.y - banana.y);
            if (dist < 20) {
                isRunning = false;
                isHit = true; 
                showHitMessage(drop_m);
            }
            if (arrow.y > hunter.y || arrow.x > width || banana.y > hunter.y) {
                isRunning = false;
            }
        }
    }

    function showHitMessage(drop) {
        const msg = document.createElement('div');
        msg.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:25px;border-radius:15px;border:4px solid #fbbf24;box-shadow:0 0 30px rgba(0,0,0,0.3);z-index:100;text-align:center;font-weight:bold;";
        msg.innerHTML = `🎯 擊中了！<br><span style="color:#ef4444;font-size:14px;">定格瞬間：下墜了 ${drop.toFixed(2)} 米</span>`;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 4000);
    }

    function render() {
        ctx.clearRect(0, 0, width, height);
        drawScenery();
        
        // 畫預設目標直線
        ctx.save();
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.moveTo(hunter.x, hunter.y);
        ctx.lineTo(hunter.x + Math.cos(angle) * 2000, hunter.y + Math.sin(angle) * 2000);
        ctx.stroke();
        ctx.restore();

        // 畫路徑軌跡
        if (arrow.trail.length > 1) {
            ctx.setLineDash([]);
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.4)';
            ctx.beginPath();
            ctx.moveTo(arrow.trail[0].x, arrow.trail[0].y);
            arrow.trail.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(234, 179, 8, 0.3)';
            ctx.beginPath();
            ctx.moveTo(banana.trail[0].x, banana.trail[0].y);
            banana.trail.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }

        // 顯示動態公式與垂直位移
        if (isRunning || isHit) {
            const linearX = hunter.x + (v0 * Math.cos(angle) * PX_PER_METER) * time;
            const linearY = hunter.y + (v0 * Math.sin(angle) * PX_PER_METER) * time;
            const drop_m = (0.5 * G * time * time).toFixed(2);
            const t_val = time.toFixed(2);
            
            ctx.save();
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.moveTo(linearX, linearY);
            ctx.lineTo(arrow.x, arrow.y);
            ctx.stroke();
            
            ctx.fillStyle = '#1e3a8a';
            ctx.font = 'italic 12px monospace';
            const formulaArrow = `s = ½(9.81)(${t_val})² = ${drop_m}m`;
            ctx.fillText(formulaArrow, linearX + 10, (linearY + arrow.y)/2);

            ctx.beginPath();
            ctx.moveTo(banana.startX, banana.startY);
            ctx.lineTo(banana.x, banana.y);
            ctx.stroke();
            
            ctx.fillStyle = '#854d0e';
            const formulaBanana = `s = ½(9.81)(${t_val})² = ${drop_m}m`;
            ctx.fillText(formulaBanana, banana.startX + 15, (banana.startY + banana.y)/2);
            ctx.restore();
        }

        // 畫猴子 (加入笑臉)
        ctx.save();
        ctx.translate(monkey.x, monkey.y);
        ctx.fillStyle = '#a16207';
        ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = '#fef08a';
        ctx.beginPath(); ctx.ellipse(0, 4, 15, 12, 0, 0, Math.PI*2); ctx.fill(); 
        // 眼睛
        ctx.fillStyle = '#422006';
        ctx.beginPath(); ctx.arc(-5, 0, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, 0, 2, 0, Math.PI*2); ctx.fill();
        // 笑臉
        ctx.strokeStyle = '#422006';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 5, 6, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
        ctx.restore();

        // 畫香蕉 (擊中時改變表情)
        if (!isRunning && !isHit && time === 0) {
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.ellipse(monkey.x + 10, monkey.y + 30, 10, 4, 0.5, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.save();
            ctx.translate(banana.x, banana.y);
            if (!isHit) ctx.rotate(time * 5);
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.ellipse(0, 0, 10, 4, 0, 0, Math.PI*2); ctx.fill();
            
            // 香蕉小表情
            ctx.strokeStyle = '#92400e';
            ctx.lineWidth = 1;
            if (isHit) {
                // 不開心的嘴巴 (倒轉)
                ctx.beginPath(); ctx.arc(0, 2, 3, Math.PI, 0); ctx.stroke();
                // 叉叉眼
                ctx.beginPath(); ctx.moveTo(-3, -2); ctx.lineTo(-1, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-1, -2); ctx.lineTo(-3, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(1, -2); ctx.lineTo(3, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(3, -2); ctx.lineTo(1, 0); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(0, -1, 2, 0, Math.PI); ctx.stroke();
            }
            ctx.restore();
        }

        drawArrow();
        update();
        requestAnimationFrame(render);
    }

    document.getElementById('fire-btn').addEventListener('click', () => {
        if (isRunning) return;
        time = 0;
        isRunning = true;
        isHit = false;
        updateAim();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        isRunning = false;
        isHit = false;
        time = 0;
        statsT.innerText = "0.00";
        statsS1.innerText = "0.00";
        statsS2.innerText = "0.00";
        updateAim();
    });

    window.addEventListener('resize', resize);
    resize();
    render();
</script>

</body>
</html>
