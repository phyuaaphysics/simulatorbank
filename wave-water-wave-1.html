<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水波干涉實驗模擬</title>
    <style>
        :root {
            --primary-color: #007AFF; /* Apple Blue */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8ed 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-orange: #ff9500;
            --success-green: #34c759;
            --danger-red: #ff3b30;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            margin: 0; padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .container {
            max-width: 960px; width: 100%; 
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px; border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            margin-top: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 10px 0; 
            text-align: center; 
            color: var(--text-main); 
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .legend-box {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-bottom: 20px; 
            padding: 15px; background: rgba(0,0,0,0.03); border-radius: 14px; font-size: 13px;
            font-weight: 500;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .peak-peak { background: var(--primary-color); box-shadow: 0 0 5px rgba(0,122,255,0.4); } 
        .trough-trough { background: var(--accent-orange); box-shadow: 0 0 5px rgba(255,149,0,0.4); } 
        .peak-trough { background: var(--success-green); box-shadow: 0 0 5px rgba(52,199,89,0.4); } 
        .line-style { width: 22px; height: 3px; background: #ff453a; border-radius: 2px; }
        .line-dash { width: 22px; height: 0; border-top: 2px dashed #8e8e93; }

        .canvas-container {
            position: relative;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 20px;
            overflow: hidden;
            touch-action: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }
        canvas { 
            display: block; width: 100%; height: auto;
            cursor: crosshair;
        }

        .controls { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 24px; margin-top: 24px; padding: 24px; 
            background: rgba(0,0,0,0.02); border-radius: 20px;
        }
        
        .control-group { display: flex; flex-direction: column; gap: 14px; }
        .control-label {
            display: flex; justify-content: space-between;
            font-size: 14px; font-weight: 600; color: var(--text-main);
        }
        
        input[type=range] { 
            -webkit-appearance: none;
            width: 100%; height: 6px; background: #d1d1d6; border-radius: 3px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px; width: 28px; border-radius: 50%; background: #ffffff;
            cursor: pointer; border: 0.5px solid rgba(0,0,0,0.04);
            box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04);
        }

        .checkbox-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px;
        }
        .checkbox-item {
            display: flex; align-items: center; justify-content: center; gap: 8px; background: white;
            padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05);
            font-size: 14px; font-weight: 600; color: var(--text-main);
            transition: all 0.2s;
        }
        .checkbox-item:active { transform: scale(0.97); background: #f2f2f7; }
        .checkbox-item input { width: 20px; height: 20px; border-radius: 6px; }

        .info-panel {
            margin-top: 20px; padding: 20px; border-radius: 18px;
            background: #ffffff; border: 1px solid rgba(0,0,0,0.03);
            font-size: 15px; line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .data-label { color: var(--text-secondary); }
        .data-val { color: var(--primary-color); font-weight: 700; font-family: 'SF Mono', ui-monospace, monospace; }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 14px;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; border-radius: 0; margin-top: 0; }
            .controls { grid-template-columns: 1fr; padding: 15px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>水波干涉實驗模擬</h1>
    <div class="subtitle">雙波源相干干涉之空間分佈視覺化</div>
    
    <div class="legend-box">
        <div class="legend-item"><div class="dot peak-peak"></div> 腹點(加強)</div>
        <div class="legend-item"><div class="dot trough-trough"></div> 腹點(加強)</div>
        <div class="legend-item"><div class="dot peak-trough"></div> 節點(抵銷)</div>
        <div class="legend-item"><div class="line-style"></div> 腹線</div>
        <div class="legend-item"><div class="line-dash"></div> 節線</div>
    </div>

    <div class="canvas-container">
        <canvas id="rippleCanvas" width="800" height="520"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <div class="control-label">
                <span>波長 (Wavelength λ)</span>
                <span><span id="lambdaVal" class="data-val">1.25</span> cm</span>
            </div>
            <input type="range" id="lambdaInput" min="0.5" max="3.0" step="0.05" value="1.25">
            
            <div class="control-label" style="margin-top: 10px;">
                <span>波源間距 (Distance d)</span>
                <span><span id="distVal" class="data-val">4.0</span> cm</span>
            </div>
            <input type="range" id="distInput" min="1.0" max="12.0" step="0.1" value="4.0">
        </div>

        <div class="control-group">
            <span class="control-label">顯示選項</span>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="showDots" checked> 干涉點
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="showAntinodal" checked> 腹線
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="showNodal" checked> 節線
                </label>
            </div>
        </div>
    </div>

    <div id="analysis" class="info-panel">
        <div style="color: var(--text-secondary); text-align: center;">請在畫布上滑動以分析特定點 P 的干涉狀態</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('rippleCanvas');
    const ctx = canvas.getContext('2d');
    const analysis = document.getElementById('analysis');

    const PX_PER_CM = 40;

    let config = {
        lambda: 1.25,
        d: 4.0,
        showDots: true,
        showAntinodal: true,
        showNodal: true,
        p: { x: 400, y: 180 }
    };

    const bind = (id, key, isCheck = false) => {
        const el = document.getElementById(id);
        const update = () => {
            config[key] = isCheck ? el.checked : parseFloat(el.value);
            if(!isCheck) document.getElementById(id.replace('Input', 'Val')).innerText = config[key].toFixed(2);
            draw();
        };
        el.addEventListener(isCheck ? 'change' : 'input', update);
    };

    bind('lambdaInput', 'lambda');
    bind('distInput', 'd');
    bind('showDots', 'showDots', true);
    bind('showAntinodal', 'showAntinodal', true);
    bind('showNodal', 'showNodal', true);

    const handlePointer = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        config.p.x = (clientX - rect.left) * scaleX;
        config.p.y = (clientY - rect.top) * scaleY;
        draw();
    };

    canvas.addEventListener('mousedown', (e) => { handlePointer(e); canvas.addEventListener('mousemove', handlePointer); });
    window.addEventListener('mouseup', () => { canvas.removeEventListener('mousemove', handlePointer); });
    canvas.addEventListener('touchstart', handlePointer, { passive: false });
    canvas.addEventListener('touchmove', handlePointer, { passive: false });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const cx = canvas.width / 2;
        const cy = canvas.height * 0.88; 
        const d_px = config.d * PX_PER_CM;
        const lambda_px = config.lambda * PX_PER_CM;
        
        const s1 = { x: cx - d_px / 2, y: cy };
        const s2 = { x: cx + d_px / 2, y: cy };

        // 1. 波前背景繪製 (優化：線條變粗、透明度提高)
        const maxR = Math.sqrt(canvas.width**2 + canvas.height**2);
        
        [s1, s2].forEach(s => {
            for (let r = lambda_px; r < maxR; r += lambda_px / 2) {
                const isPeak = Math.round(r / (lambda_px / 2)) % 2 === 0;
                // 加粗加亮線條
                ctx.lineWidth = isPeak ? 2.5 : 2.0;
                ctx.strokeStyle = isPeak ? 'rgba(0, 122, 255, 0.25)' : 'rgba(255, 59, 48, 0.25)';
                ctx.setLineDash(isPeak ? [] : [8, 6]);
                ctx.beginPath();
                ctx.arc(s.x, s.y, r, Math.PI, 2 * Math.PI);
                ctx.stroke();
            }
        });

        // 2. 腹線與節線 (雙曲線)
        const drawHyperbola = (pd_cm, isNodal) => {
            if (Math.abs(pd_cm) >= config.d) return;
            ctx.beginPath();
            ctx.setLineDash(isNodal ? [12, 8] : []);
            ctx.strokeStyle = isNodal ? 'rgba(100, 100, 110, 0.6)' : 'rgba(255, 69, 58, 0.85)';
            ctx.lineWidth = isNodal ? 2.5 : 4.5; // 加粗

            const a = (Math.abs(pd_cm) / 2) * PX_PER_CM;
            const c = (config.d / 2) * PX_PER_CM;
            
            if (a < 0.5) {
                ctx.moveTo(cx, 0); ctx.lineTo(cx, cy);
            } else {
                const b = Math.sqrt(c * c - a * a);
                const sign = pd_cm > 0 ? 1 : -1;
                for (let t = -3.8; t <= 3.8; t += 0.05) {
                    const hx = sign * a * Math.cosh(t);
                    const hy = b * Math.sinh(t);
                    const px = cx + hx;
                    const py = cy - hy;
                    if (py < cy + 5) {
                        if (t === -3.8) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    }
                }
            }
            ctx.stroke();
        };

        const maxN = Math.floor(config.d / config.lambda);
        if (config.showAntinodal) {
            for (let n = -maxN; n <= maxN; n++) drawHyperbola(n * config.lambda, false);
        }
        if (config.showNodal) {
            for (let n = -maxN - 1; n <= maxN; n++) drawHyperbola((n + 0.5) * config.lambda, true);
        }

        // 3. 精確干涉點 (加大球體)
        if (config.showDots) {
            const step = lambda_px / 2;
            for (let r1 = step; r1 < maxR; r1 += step) {
                for (let r2 = step; r2 < maxR; r2 += step) {
                    if (Math.abs(r1 - r2) > d_px + 1) continue;
                    const pts = circleIntersection(s1.x, s1.y, r1, s2.x, s2.y, r2);
                    pts.forEach(pt => {
                        if (pt.y < cy) {
                            const p1 = Math.round(r1/step) % 2 === 0;
                            const p2 = Math.round(r2/step) % 2 === 0;
                            ctx.fillStyle = (p1 && p2) ? '#007AFF' : (!p1 && !p2) ? '#FF9500' : '#34C759';
                            ctx.beginPath(); ctx.arc(pt.x, pt.y, 4.5, 0, Math.PI*2); ctx.fill();
                        }
                    });
                }
            }
        }

        // 4. 波源設計
        ctx.setLineDash([]);
        [s1, s2].forEach((s, i) => {
            ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.fillStyle = '#1d1d1f';
            ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#86868b'; ctx.font = 'bold 13px -apple-system';
            ctx.fillText(`S${i+1}`, s.x - 10, s.y + 30);
        });

        // 5. 測試點 P 互動設計
        ctx.strokeStyle = 'rgba(0, 122, 255, 0.4)'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(config.p.x, config.p.y);
        ctx.lineTo(s2.x, s2.y); ctx.stroke();
        
        ctx.fillStyle = '#FF3B30'; ctx.strokeStyle = 'white'; ctx.lineWidth = 4;
        ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(255,59,48,0.3)';
        ctx.beginPath(); ctx.arc(config.p.x, config.p.y, 14, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        updateStats(s1, s2, config.lambda);
    }

    function circleIntersection(x0, y0, r0, x1, y1, r1) {
        let dx = x1 - x0, dy = y1 - y0;
        let d = Math.sqrt(dx * dx + dy * dy);
        if (d > r0 + r1 || d < Math.abs(r0 - r1) || d === 0) return [];
        let a = (r0 * r0 - r1 * r1 + d * d) / (2 * d);
        let h = Math.sqrt(Math.max(0, r0 * r0 - a * a));
        let x2 = x0 + a * dx / d, y2 = y0 + a * dy / d;
        return [{ x: x2 + h * dy / d, y: y2 - h * dx / d }, { x: x2 - h * dy / d, y: y2 + h * dx / d }];
    }

    function updateStats(s1, s2, lambda_cm) {
        const r1_cm = Math.sqrt((config.p.x - s1.x)**2 + (config.p.y - s1.y)**2) / PX_PER_CM;
        const r2_cm = Math.sqrt((config.p.x - s2.x)**2 + (config.p.y - s2.y)**2) / PX_PER_CM;
        const pd_cm = Math.abs(r1_cm - r2_cm);
        const n = pd_cm / lambda_cm;
        
        let statusText = "一般區域";
        let badgeColor = "#e5e5ea";
        let textColor = "#8e8e93";

        if (Math.abs(n - Math.round(n)) < 0.08) {
            statusText = "完全相長干涉 (腹點)";
            badgeColor = "#e1f5fe";
            textColor = "#007AFF";
        } else if (Math.abs(n - (Math.floor(n) + 0.5)) < 0.08) {
            statusText = "完全相消干涉 (節點)";
            badgeColor = "#e8f5e9";
            textColor = "#34C759";
        }

        analysis.innerHTML = `
            <div class="data-row">
                <span class="data-label">波源路徑長 PS₁ / PS₂</span>
                <span><span class="data-val">${r1_cm.toFixed(2)}</span> / <span class="data-val">${r2_cm.toFixed(2)}</span> cm</span>
            </div>
            <div class="data-row">
                <span class="data-label">路程差 Δr = |PS₁ - PS₂|</span>
                <span><span class="data-val">${pd_cm.toFixed(2)}</span> cm</span>
            </div>
            <div class="data-row">
                <span class="data-label">波長倍數關係</span>
                <span>Δr = <span class="data-val">${n.toFixed(2)}</span> λ</span>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <span class="status-badge" style="background: ${badgeColor}; color: ${textColor}">${statusText}</span>
            </div>
        `;
    }

    window.onload = draw;
    window.addEventListener('resize', draw);
</script>

</body>
</html>
