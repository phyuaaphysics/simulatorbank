<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to MathType (MathML) Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                enableMenu: false
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady();
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .markdown-body { line-height: 1.6; }
        .markdown-body h1 { font-size: 1.875rem; font-weight: 700; margin-bottom: 1rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body code { font-family: 'Fira Code', monospace; background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
        .markdown-body pre { background: #1f2937; color: #f9fafb; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; }
        
        /* MathML Source View Styling */
        #mml-output {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap;
            word-break: break-all;
            background: #0f172a;
            color: #38bdf8;
            font-size: 0.75rem;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .active-tab { border-bottom: 2px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 py-3 px-6 flex justify-between items-center z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 7V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3" /><path d="M9 11v11" /><path d="M15 11v11" /><path d="M9 11h6" /><path d="M20 7H4" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800 leading-tight">MathType Pro Converter</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Markdown to MathML Output</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="loadSample()" class="px-3 py-1.5 text-xs font-semibold text-slate-600 hover:bg-slate-100 rounded-md transition-all">
                Sample
            </button>
            <button onclick="copyCurrentOutput()" id="copy-btn" class="px-4 py-1.5 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-md shadow-sm transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                Copy MathML
            </button>
        </div>
    </header>

    <main class="flex-1 flex h-full overflow-hidden">
        <!-- Editor Section -->
        <section class="w-1/2 flex flex-col border-r border-slate-200 bg-white">
            <div class="px-4 py-2 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Editor (Markdown + TeX)</span>
                <span id="char-count" class="text-[10px] text-slate-400 font-medium">0 chars</span>
            </div>
            <textarea id="editor" class="flex-1 p-6 font-mono text-sm text-slate-700 focus:outline-none resize-none leading-relaxed custom-scrollbar" placeholder="Enter Markdown... e.g. $E=mc^2$"></textarea>
        </section>

        <!-- Preview/Code Section -->
        <section class="w-1/2 flex flex-col bg-white">
            <div class="flex border-b border-slate-200 bg-slate-50">
                <button onclick="switchTab('preview')" id="tab-preview" class="px-6 py-2 text-[10px] font-bold uppercase tracking-widest active-tab transition-all">Visual Preview</button>
                <button onclick="switchTab('code')" id="tab-code" class="px-6 py-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-all">MathML Code</button>
            </div>
            
            <div class="flex-1 relative overflow-hidden">
                <!-- Visual Display -->
                <div id="preview-container" class="absolute inset-0 p-8 overflow-y-auto markdown-body custom-scrollbar">
                    <div id="preview-content"></div>
                </div>
                
                <!-- MathML Source -->
                <div id="code-container" class="absolute inset-0 hidden flex flex-col">
                    <div class="bg-slate-900 text-slate-400 px-4 py-2 text-[10px] font-mono">MathType / MS Word Compatible XML</div>
                    <pre id="mml-output" class="flex-1 p-6 overflow-y-auto custom-scrollbar"></pre>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2.5 rounded-full shadow-2xl text-xs font-bold opacity-0 transition-opacity duration-300 pointer-events-none">
        Copied to Clipboard
    </div>

    <script>
        const editor = document.getElementById('editor');
        const previewContent = document.getElementById('preview-content');
        const mmlOutput = document.getElementById('mml-output');
        const charCount = document.getElementById('char-count');
        const toast = document.getElementById('toast');
        const copyBtn = document.getElementById('copy-btn');
        
        let activeTab = 'preview';
        let mathTimeout;

        // Initialize marked
        marked.setOptions({ breaks: true, gfm: true });

        // Update functionality
        async function updateOutput() {
            const val = editor.value;
            charCount.textContent = `${val.length} chars`;

            // Render Markdown
            previewContent.innerHTML = marked.parse(val);

            // Trigger MathJax typeset
            clearTimeout(mathTimeout);
            mathTimeout = setTimeout(async () => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    await window.MathJax.typesetPromise([previewContent]);
                    generateMathML();
                }
            }, 300);
        }

        // Extract MathML for MathType compatibility
        function generateMathML() {
            let combinedMathML = "";
            const mathElements = previewContent.querySelectorAll('mjx-container');
            
            if (mathElements.length === 0) {
                mmlOutput.textContent = "No equations detected yet. Type some math using $...$ to generate MathML code.";
                return;
            }

            mathElements.forEach((container, index) => {
                // Get the MathML via MathJax internal API
                try {
                    const mml = window.MathJax.startup.adaptor.outerHTML(container.querySelector('math'));
                    // Removed the Equation comment for a cleaner output
                    combinedMathML += `${formatXml(mml)}\n\n`;
                } catch (e) {
                    console.warn("Could not extract MathML for an element", e);
                }
            });

            mmlOutput.textContent = combinedMathML || "Processing math...";
        }

        // Basic XML formatting for readability
        function formatXml(xml) {
            let formatted = '';
            let reg = /(>)(<)(\/*)/g;
            xml = xml.replace(reg, '$1\r\n$2$3');
            let pad = 0;
            xml.split('\r\n').forEach(function(node) {
                let indent = 0;
                if (node.match( /.+<\/\w[^>]*>$/ )) {
                    indent = 0;
                } else if (node.match( /^<\/\w/ )) {
                    if (pad != 0) pad -= 1;
                } else if (node.match( /^<\w[^>]*[^\/]>.*$/ )) {
                    indent = 1;
                } else {
                    indent = 0;
                }
                formatted += '  '.repeat(pad) + node + '\r\n';
                pad += indent;
            });
            return formatted.trim();
        }

        // Tab Switching
        function switchTab(tab) {
            activeTab = tab;
            const prevContainer = document.getElementById('preview-container');
            const codeContainer = document.getElementById('code-container');
            const tabPrev = document.getElementById('tab-preview');
            const tabCode = document.getElementById('tab-code');

            if (tab === 'preview') {
                prevContainer.classList.remove('hidden');
                codeContainer.classList.add('hidden');
                tabPrev.classList.add('active-tab');
                tabCode.classList.remove('active-tab');
                copyBtn.innerHTML = `<span>Copy HTML</span>`;
            } else {
                prevContainer.classList.add('hidden');
                codeContainer.classList.remove('hidden');
                tabPrev.classList.remove('active-tab');
                tabCode.classList.add('active-tab');
                copyBtn.innerHTML = `<span>Copy MathML</span>`;
            }
        }

        // Copy functionality
        function copyCurrentOutput() {
            let text = "";
            if (activeTab === 'preview') {
                text = previewContent.innerHTML;
            } else {
                // Clean up XML comments before copying for direct MathType usage
                text = mmlOutput.textContent.replace(/<!--.*?-->/g, "").trim();
            }

            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            showToast();
        }

        function showToast() {
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function loadSample() {
            editor.value = `# MathType Output Guide

Use standard LaTeX syntax for your equations.

## Quadratic Formula
$$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$

## Schrödinger Equation
$$i\hbar \frac{\partial}{\partial t} \Psi(\mathbf{r},t) = \left [ \frac{-\hbar^2}{2m}\nabla^2 + V(\mathbf{r},t)\right ] \Psi(\mathbf{r},t)$$

Switch to the **MathML Code** tab to see the raw output that you can paste directly into MathType or MS Word.`;
            updateOutput();
        }

        editor.addEventListener('input', updateOutput);
        window.onload = loadSample;
    </script>
</body>
</html>
