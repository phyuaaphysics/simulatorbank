<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水波槽干涉模擬器 - 標題：水波干涉實驗模擬</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #f0f2f5; margin: 0; padding: 15px;
            color: #333;
        }
        .container {
            max-width: 900px; width: 100%; background: white;
            padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .canvas-container {
            position: relative;
            background: #fdfdfd;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas { 
            display: block; width: 100%; height: auto;
            cursor: crosshair; touch-action: none;
        }
        .controls { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        label { font-size: 14px; font-weight: 600; color: #495057; }
        input[type=range] { width: 100%; cursor: pointer; }
        
        .info-panel {
            margin-top: 20px; padding: 15px; border-radius: 8px;
            background: #fff9db; border-left: 5px solid #fcc419;
            font-size: 15px; line-height: 1.6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .data-val { color: #e67e22; font-weight: bold; font-family: 'Courier New', Courier, monospace; }
        
        .legend-box {
            display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; 
            padding: 10px; border: 1px solid #eee; border-radius: 6px; font-size: 13px;
            background: #fff;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }
        .peak-peak { background: #339af0; } 
        .trough-trough { background: #ff922b; } 
        .peak-trough { background: #51cf66; } 
        .line-style { width: 25px; height: 0; border-top: 2.5px solid rgba(255, 107, 107, 0.7); }
        .line-dash { width: 25px; height: 0; border-top: 1.5px dashed rgba(134, 142, 150, 0.8); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; text-align:center; color: #2c3e50;">水波干涉實驗模擬</h2>
    
    <div class="legend-box">
        <div class="legend-item"><div class="dot peak-peak"></div> 波峰+波峰</div>
        <div class="legend-item"><div class="dot trough-trough"></div> 波谷+波谷</div>
        <div class="legend-item"><div class="dot peak-trough"></div> 波峰+波谷</div>
        <div class="legend-item"><div class="line-style"></div> 腹線 (Antinodal)</div>
        <div class="legend-item"><div class="line-dash"></div> 節線 (Nodal)</div>
    </div>

    <div class="canvas-container">
        <canvas id="rippleCanvas" width="800" height="450"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>波長 (Wavelength λ): <span id="lambdaVal" class="data-val">50</span> px</label>
            <input type="range" id="lambdaInput" min="20" max="100" step="1" value="50">
        </div>
        <div class="control-group">
            <label>波源間距 (Distance d): <span id="distVal" class="data-val">150</span> px</label>
            <input type="range" id="distInput" min="40" max="400" step="10" value="150">
        </div>
        <div class="control-group checkbox-group">
            <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" id="showDots" checked> 顯示干涉點
            </label>
            <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" id="showAntinodal" checked> 顯示腹線
            </label>
            <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" id="showNodal" checked> 顯示節線
            </label>
        </div>
    </div>

    <div class="info-panel" id="analysis">
        點擊畫布以放置測試點 P 並即時分析其干涉性質。
    </div>
</div>

<script>
    const canvas = document.getElementById('rippleCanvas');
    const ctx = canvas.getContext('2d');
    const analysis = document.getElementById('analysis');

    let config = {
        lambda: 50,
        d: 150,
        showDots: true,
        showAntinodal: true,
        showNodal: true,
        p: { x: 400, y: 150 }
    };

    const bind = (id, key, isCheck = false) => {
        document.getElementById(id).addEventListener(isCheck ? 'change' : 'input', (e) => {
            config[key] = isCheck ? e.target.checked : parseInt(e.target.value);
            if(!isCheck) document.getElementById(id.replace('Input', 'Val')).innerText = config[key];
            draw();
        });
    };

    bind('lambdaInput', 'lambda');
    bind('distInput', 'd');
    bind('showDots', 'showDots', true);
    bind('showAntinodal', 'showAntinodal', true);
    bind('showNodal', 'showNodal', true);

    const handleInput = (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
        const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
        config.p.x = (clientX - rect.left) * scaleX;
        config.p.y = (clientY - rect.top) * scaleY;
        draw();
    };

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleInput(e); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const cx = canvas.width / 2;
        const cy = canvas.height * 0.85; 
        const s1 = { x: cx - config.d / 2, y: cy };
        const s2 = { x: cx + config.d / 2, y: cy };
        const lambda = config.lambda;

        // 1. 繪製波前
        const maxR = Math.sqrt(canvas.width**2 + canvas.height**2);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(255, 107, 107, 0.4)';
        
        [s1, s2].forEach(s => {
            for (let r = lambda; r < maxR; r += lambda / 2) {
                const isPeak = Math.round(r / (lambda / 2)) % 2 === 0;
                ctx.setLineDash(isPeak ? [] : [4, 4]);
                ctx.beginPath();
                ctx.arc(s.x, s.y, r, Math.PI, 2 * Math.PI);
                ctx.stroke();
            }
        });

        // 2. 參數方程繪製雙曲線 (精確且平滑)
        const drawSmoothHyperbola = (pd, isNodal) => {
            if (Math.abs(pd) >= config.d) return;
            
            ctx.beginPath();
            ctx.setLineDash(isNodal ? [6, 4] : []);
            ctx.strokeStyle = isNodal ? 'rgba(134, 142, 150, 0.8)' : 'rgba(255, 107, 107, 0.8)';
            ctx.lineWidth = isNodal ? 1.5 : 2.5;

            const a = Math.abs(pd) / 2;
            const c = config.d / 2;
            
            if (a < 0.1) { // 中垂線
                ctx.moveTo(cx, 0);
                ctx.lineTo(cx, cy);
            } else {
                const b = Math.sqrt(c * c - a * a);
                const sign = pd > 0 ? 1 : -1;
                
                // 增加採樣點數量確保極度平滑
                for (let t = -4; t <= 4; t += 0.01) {
                    const hx = sign * a * Math.cosh(t);
                    const hy = b * Math.sinh(t);
                    
                    const plotX = cx + hx;
                    const plotY = cy - hy;
                    
                    if (plotX >= -50 && plotX <= canvas.width + 50 && plotY >= -50 && plotY <= cy) {
                        if (t === -4) ctx.moveTo(plotX, plotY);
                        else ctx.lineTo(plotX, plotY);
                    }
                }
            }
            ctx.stroke();
        };

        const maxN = Math.floor(config.d / lambda);
        if (config.showAntinodal) {
            for (let n = -maxN; n <= maxN; n++) drawSmoothHyperbola(n * lambda, false);
        }
        if (config.showNodal) {
            for (let n = -maxN - 1; n <= maxN; n++) drawSmoothHyperbola((n + 0.5) * lambda, true);
        }

        // 3. 干涉點
        if (config.showDots) {
            const range = Math.ceil(maxR / (lambda/2));
            for (let i = 1; i < range; i++) {
                for (let j = 1; j < range; j++) {
                    const r1 = i * (lambda / 2);
                    const r2 = j * (lambda / 2);
                    const intersections = circleIntersection(s1.x, s1.y, r1, s2.x, s2.y, r2);
                    intersections.forEach(pt => {
                        if (pt.y < cy) {
                            const isPeak1 = i % 2 === 0;
                            const isPeak2 = j % 2 === 0;
                            ctx.fillStyle = (isPeak1 && isPeak2) ? '#339af0' : 
                                            (!isPeak1 && !isPeak2) ? '#ff922b' : '#51cf66';
                            ctx.beginPath();
                            ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });
                }
            }
        }

        // 4. 波源
        ctx.setLineDash([]);
        ctx.fillStyle = '#c92a2a';
        [s1, s2].forEach((s, i) => {
            ctx.beginPath(); ctx.arc(s.x, s.y, 7, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 13px sans-serif';
            ctx.fillText(`S${i+1}`, s.x - 10, s.y + 20);
        });

        // 5. 測試點 P
        ctx.strokeStyle = '#228be6';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(s1.x, s1.y); ctx.lineTo(config.p.x, config.p.y);
        ctx.moveTo(s2.x, s2.y); ctx.lineTo(config.p.x, config.p.y);
        ctx.stroke();
        ctx.fillStyle = '#fa5252';
        ctx.beginPath(); ctx.arc(config.p.x, config.p.y, 7, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.stroke();

        updateStats(s1, s2, lambda);
    }

    function circleIntersection(x0, y0, r0, x1, y1, r1) {
        let dx = x1 - x0, dy = y1 - y0;
        let d = Math.sqrt(dx * dx + dy * dy);
        if (d > r0 + r1 || d < Math.abs(r0 - r1) || d === 0) return [];
        let a = (r0 * r0 - r1 * r1 + d * d) / (2 * d);
        let h = Math.sqrt(Math.max(0, r0 * r0 - a * a));
        let x2 = x0 + a * dx / d, y2 = y0 + a * dy / d;
        return [
            { x: x2 + h * dy / d, y: y2 - h * dx / d },
            { x: x2 - h * dy / d, y: y2 + h * dx / d }
        ];
    }

    function updateStats(s1, s2, lambda) {
        const r1 = Math.sqrt((config.p.x - s1.x)**2 + (config.p.y - s1.y)**2);
        const r2 = Math.sqrt((config.p.x - s2.x)**2 + (config.p.y - s2.y)**2);
        const pd = Math.abs(r1 - r2);
        const n = pd / lambda;
        const eps = 0.15;
        let status = "一般區域";
        if (Math.abs(n - Math.round(n)) < eps) status = "<b style='color:#339af0'>相長干涉 (腹點)</b>";
        else if (Math.abs(n - (Math.floor(n) + 0.5)) < eps) status = "<b style='color:#2b8a3e'>相消干涉 (節點)</b>";

        analysis.innerHTML = `
            <b>點 P 分析：</b> PS₁ = ${r1.toFixed(1)} px, PS₂ = ${r2.toFixed(1)} px<br>
            <b>路程差 Δr：</b> |PS₁ - PS₂| = <span class="data-val">${pd.toFixed(1)}</span> px<br>
            <b>波長關係：</b> Δr = <span class="data-val">${n.toFixed(2)}</span> λ<br>
            <b>狀態判斷：</b> ${status}
        `;
    }

    window.onload = draw;
</script>

</body>
</html>
