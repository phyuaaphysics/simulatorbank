<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水波折射物理模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            border: 2px solid #334155;
            border-radius: 12px;
            background-color: #fff;
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        input[type="range"] {
            accent-color: #3b82f6;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-slate-800">水波折射模擬器 (平滑版)</h1>
            <p class="text-slate-600 mt-2">調整參數觀察水波在不同介質間的行為</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- 控制面板 -->
            <div class="lg:col-span-1 space-y-5 control-panel p-6 rounded-2xl shadow-sm border border-slate-200">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">入射角度 (Degrees)</label>
                    <input type="range" id="angleInput" min="0" max="75" value="30" class="w-full h-2 bg-slate-200 rounded-lg cursor-pointer">
                    <div class="flex justify-between text-xs text-slate-500 mt-1">
                        <span>0°</span>
                        <span id="angleValue" class="font-bold text-blue-600">30°</span>
                        <span>75°</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">波源頻率 (Frequency)</label>
                    <input type="range" id="freqInput" min="0.2" max="1.5" step="0.1" value="0.6" class="w-full h-2 bg-slate-200 rounded-lg cursor-pointer">
                    <div class="flex justify-between text-xs text-slate-500 mt-1">
                        <span>慢</span>
                        <span id="freqValue" class="font-bold text-blue-600">0.6</span>
                        <span>快</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">波速比 (深水/淺水)</label>
                    <input type="range" id="ratioInput" min="1.1" max="2.2" step="0.1" value="1.5" class="w-full h-2 bg-slate-200 rounded-lg cursor-pointer">
                    <div class="flex justify-between text-xs text-slate-500 mt-1">
                        <span>1.1</span>
                        <span id="ratioValue" class="font-bold text-blue-600">1.5</span>
                        <span>2.2</span>
                    </div>
                </div>

                <div class="pt-2">
                    <button id="toggleBtn" class="w-full py-2 px-4 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-medium transition-colors">
                        暫停 / 播放
                    </button>
                </div>

                <div class="pt-4 border-t border-slate-200 text-xs text-slate-600">
                    <p class="font-bold mb-1">觀察重點：</p>
                    <ul class="space-y-1 list-disc pl-4">
                        <li>淺水區波速慢，波長 $\lambda$ 變短。</li>
                        <li>進入淺水區時，波前會向「法線」偏折。</li>
                    </ul>
                </div>
            </div>

            <!-- 繪圖區 -->
            <div class="lg:col-span-3 flex flex-col items-center">
                <canvas id="waveCanvas" width="800" height="500"></canvas>
                <div class="mt-4 flex gap-8 text-sm font-bold">
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 bg-blue-500 opacity-60 rounded-sm"></div>
                        <span class="text-slate-700">深水區 (介質 1)</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 bg-cyan-300 opacity-60 rounded-sm"></div>
                        <span class="text-slate-700">淺水區 (介質 2)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        
        const angleInput = document.getElementById('angleInput');
        const freqInput = document.getElementById('freqInput');
        const ratioInput = document.getElementById('ratioInput');
        const toggleBtn = document.getElementById('toggleBtn');
        
        const angleValueDisplay = document.getElementById('angleValue');
        const freqValueDisplay = document.getElementById('freqValue');
        const ratioValueDisplay = document.getElementById('ratioValue');

        let isRunning = true;
        let lastTimestamp = 0;
        let waveTime = 0; // 獨立的時間變數，用於控制波的位移
        
        let config = {
            angleDeg: 30,
            frequency: 0.6,
            v1: 50, 
            v2: 33.3,
        };

        toggleBtn.addEventListener('click', () => {
            isRunning = !isRunning;
        });

        function updateValues() {
            config.angleDeg = parseFloat(angleInput.value);
            config.frequency = parseFloat(freqInput.value);
            const ratio = parseFloat(ratioInput.value);
            config.v2 = config.v1 / ratio;

            angleValueDisplay.textContent = config.angleDeg + '°';
            freqValueDisplay.textContent = config.frequency;
            ratioValueDisplay.textContent = ratio.toFixed(1);
        }

        function draw(timestamp) {
            // 計算 Delta Time 確保動畫平滑
            if (!lastTimestamp) lastTimestamp = timestamp;
            const dt = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;

            if (isRunning) {
                // 降低速度倍率，解決「閃爍」感
                waveTime += dt * 1.5; 
            }

            updateValues();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const midX = canvas.width / 2;
            const midY = canvas.height / 2;
            
            // 1. 背景
            ctx.fillStyle = '#60a5fa'; // 深水
            ctx.fillRect(0, 0, midX, canvas.height);
            ctx.fillStyle = '#a5f3fc'; // 淺水
            ctx.fillRect(midX, 0, canvas.width - midX, canvas.height);

            // 2. 交界線
            ctx.beginPath();
            ctx.moveTo(midX, 0);
            ctx.lineTo(midX, canvas.height);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 物理計算
            const theta1 = config.angleDeg * Math.PI / 180;
            const sinTheta2 = Math.sin(theta1) * (config.v2 / config.v1);
            const theta2 = Math.asin(sinTheta2);
            
            const lambda1 = (config.v1 / config.frequency) * 0.6;
            const lambda2 = (config.v2 / config.frequency) * 0.6;

            // 3. 繪製波前
            ctx.save();
            ctx.strokeStyle = 'rgba(29, 78, 216, 0.7)'; // 稍帶透明度減少視覺疲勞
            ctx.lineWidth = 2.5;

            // 動畫偏移量
            const offset1 = (waveTime * config.v1) % lambda1;
            const offset2 = (waveTime * config.v2) % lambda2;

            // 繪製多條波前線
            for (let i = -25; i < 25; i++) {
                drawWaveFront(ctx, i * lambda1 + offset1, theta1, midX, true, lambda1);
                drawWaveFront(ctx, i * lambda2 + offset2, theta2, midX, false, lambda2);
            }
            ctx.restore();

            // 4. 繪製射線與文字標籤
            drawRay(ctx, midX, midY, theta1, theta2);
            
            ctx.fillStyle = '#0f172a';
            ctx.font = '600 14px sans-serif';
            ctx.fillText('深水 (λ₁ 較長)', 40, 40);
            ctx.fillText('淺水 (λ₂ 較短)', midX + 40, 40);

            requestAnimationFrame(draw);
        }

        function drawWaveFront(ctx, d, angle, boundaryX, isLeft, currentLambda) {
            const length = 1200;
            const perpAngle = angle + Math.PI / 2;
            
            const cx = boundaryX + d * Math.cos(angle);
            const cy = canvas.height / 2 + d * Math.sin(angle);

            const x1 = cx + Math.cos(perpAngle) * length;
            const y1 = cy + Math.sin(perpAngle) * length;
            const x2 = cx - Math.cos(perpAngle) * length;
            const y2 = cy - Math.sin(perpAngle) * length;

            ctx.save();
            ctx.beginPath();
            if (isLeft) {
                ctx.rect(0, 0, boundaryX, canvas.height);
            } else {
                ctx.rect(boundaryX, 0, canvas.width - boundaryX, canvas.height);
            }
            ctx.clip();
            
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.restore();
        }

        function drawRay(ctx, x, y, t1, t2) {
            // 繪製入射與折射路徑 (Ray)
            ctx.beginPath();
            ctx.setLineDash([8, 4]);
            ctx.strokeStyle = '#dc2626'; // 紅色
            ctx.lineWidth = 3;

            const rLen = 220;
            ctx.moveTo(x - rLen * Math.cos(t1), y - rLen * Math.sin(t1));
            ctx.lineTo(x, y);
            ctx.lineTo(x + rLen * Math.cos(t2), y + rLen * Math.sin(t2));
            ctx.stroke();
            ctx.setLineDash([]);

            // 繪製箭頭
            drawArrow(ctx, x - rLen/2 * Math.cos(t1), y - rLen/2 * Math.sin(t1), t1);
            drawArrow(ctx, x + rLen/2 * Math.cos(t2), y + rLen/2 * Math.sin(t2), t2);
            
            // 法線
            ctx.beginPath();
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            ctx.moveTo(x - 80, y);
            ctx.lineTo(x + 80, y);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawArrow(ctx, x, y, angle) {
            const size = 12;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-size, -size/1.5);
            ctx.lineTo(-size, size/1.5);
            ctx.fill();
            ctx.restore();
        }

        requestAnimationFrame(draw);
    </script>
</body>
</html>
