<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理光學模擬器 - 近視矯正與虛像</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        canvas { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); touch-action: none; border: 1px solid #e2e8f0; }
        .control-panel { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-slate-800">透鏡成像與近視矯正模擬器</h1>
            <p class="text-slate-600 mt-2">視覺化：當虛像進入遠點後，水晶體的調節(變厚)過程</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="control-panel">
                    <h2 class="font-bold text-lg mb-4 border-b pb-2">實驗參數</h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-blue-700">實物位置 (u)</label>
                        <input type="range" id="objPos" min="150" max="850" value="700" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between text-xs text-gray-500 mt-1"><span id="uVal">700</span>px</div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700">眼鏡焦距 (f)</label>
                        <input type="range" id="focalLen" min="-400" max="400" value="-200" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between text-xs text-gray-500 mt-1"><span id="fVal">-200</span>px</div>
                    </div>

                    <div class="mb-4 border-t pt-4">
                        <label class="block text-sm font-medium text-red-600 font-bold">人眼遠點 (Far Point)</label>
                        <input type="range" id="farPoint" min="100" max="450" value="250" class="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between text-xs text-gray-500 mt-1"><span id="fpVal">250</span>px</div>
                    </div>

                    <div class="pt-4 border-t">
                        <div id="statusMsg" class="p-3 rounded text-sm font-medium text-center"></div>
                        <div id="accMsg" class="mt-2 text-[11px] text-center text-slate-500 italic"></div>
                    </div>
                </div>

                <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-200">
                    <h3 class="font-bold text-indigo-800 text-sm">視覺化原理：</h3>
                    <ul class="text-xs text-indigo-700 mt-2 space-y-2 list-disc ml-4">
                        <li><b>晶體變薄</b>：觀察遠處虛像時，晶體受力拉扁，厚度降至最低。</li>
                        <li><b>調節增厚</b>：當虛像靠近，晶體彈性回縮變厚，以增加折射力。</li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col">
                <canvas id="opticsCanvas" class="w-full h-[550px]"></canvas>
                <div class="mt-4 grid grid-cols-2 md:grid-cols-4 text-center text-[10px] md:text-xs font-semibold text-gray-600 gap-2">
                    <div>🔵 實物 (Object)</div>
                    <div>🟠 虛像 (Virtual Image)</div>
                    <div>👁️ 水晶體 (超薄放鬆態)</div>
                    <div>🔴 遠點邊界</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        
        const objInput = document.getElementById('objPos');
        const focalInput = document.getElementById('focalLen');
        const farPointInput = document.getElementById('farPoint');
        
        const uDisp = document.getElementById('uVal');
        const fDisp = document.getElementById('fVal');
        const fpDisp = document.getElementById('fpVal');
        const statusMsg = document.getElementById('statusMsg');
        const accMsg = document.getElementById('accMsg');

        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 550;
            draw();
        }

        window.addEventListener('resize', resize);

        // 調整後的繪製函數：更薄的基礎厚度
        function drawEye(x, y, r, thicknessFactor) {
            // 眼球背景
            ctx.beginPath();
            ctx.fillStyle = '#fff0f3';
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.stroke();

            // 視網膜
            ctx.beginPath();
            ctx.strokeStyle = '#ff4d94';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.arc(x, y, r, -Math.PI * 0.3, Math.PI * 0.3);
            ctx.stroke();

            // 水晶體動態厚度：
            // baseThickness 降至 8，讓它在放鬆時顯得更「薄」
            const baseThickness = 8; 
            const extraThickness = 18 * thicknessFactor;
            const currentThickness = baseThickness + extraThickness;
            
            const lensPosX = x - r + 25;
            ctx.beginPath();
            ctx.strokeStyle = '#00a8ff';
            ctx.fillStyle = 'rgba(0, 168, 255, 0.2)';
            ctx.lineWidth = 2;
            // 高度根據厚度適度調整
            ctx.ellipse(lensPosX, y, currentThickness, 42 - (thicknessFactor * 6), 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            return lensPosX;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerY = canvas.height / 2;
            const eyeCenterX = canvas.width - 150;
            const eyeRadius = 100;
            const lensX = eyeCenterX - eyeRadius - 40;
            
            const u = parseFloat(objInput.value);
            const f = parseFloat(focalInput.value);
            const farPoint = parseFloat(farPointInput.value);
            
            uDisp.innerText = u;
            fDisp.innerText = f === 0 ? "無" : f;
            fpDisp.innerText = farPoint;

            let v = (f === 0) ? -u : (f * u) / (u - f);
            const imgX = lensX + v;
            const imageDist = Math.abs(v);

            let thicknessFactor = 0;
            if (imageDist <= farPoint) {
                const nearPoint = 80;
                thicknessFactor = Math.max(0, Math.min(1, (farPoint - imageDist) / (farPoint - nearPoint)));
            }

            ctx.fillStyle = 'rgba(239, 68, 68, 0.08)';
            ctx.fillRect(lensX - farPoint, 0, farPoint, canvas.height);
            ctx.strokeStyle = '#fca5a5';
            ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.moveTo(lensX - farPoint, 40); ctx.lineTo(lensX - farPoint, canvas.height-40); ctx.stroke();
            ctx.setLineDash([]);

            const crystalX = drawEye(eyeCenterX, centerY, eyeRadius, thicknessFactor);

            ctx.lineWidth = 4;
            ctx.strokeStyle = '#475569';
            ctx.beginPath(); ctx.moveTo(lensX, centerY-70); ctx.lineTo(lensX, centerY+70); ctx.stroke();
            if(f > 0) { drawArrow(lensX, centerY-70, 1); drawArrow(lensX, centerY+70, -1); }
            else if(f < 0) { drawArrow(lensX, centerY-70, -1); drawArrow(lensX, centerY+70, 1); }

            const objX = lensX - u;
            const objH = 60;
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(objX, centerY); ctx.lineTo(objX, centerY - objH); ctx.stroke();
            drawArrow(objX, centerY-objH, 1, '#3b82f6');
            ctx.fillStyle = '#3b82f6';
            ctx.fillText('實物', objX - 15, centerY + 25);

            const rayOffsets = [-40, 0, 40];
            if (v < 0) {
                const imgH = objH * (Math.abs(v) / u);
                rayOffsets.forEach(offset => {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
                    ctx.moveTo(objX, centerY - objH);
                    ctx.lineTo(lensX, centerY + offset);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(234, 179, 8, 0.8)';
                    ctx.moveTo(lensX, centerY + offset);
                    ctx.lineTo(crystalX, centerY + (offset * 0.8));
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.setLineDash([2, 4]);
                    ctx.strokeStyle = 'rgba(249, 115, 22, 0.5)';
                    ctx.moveTo(lensX, centerY + offset);
                    ctx.lineTo(imgX, centerY - imgH);
                    ctx.stroke();
                    ctx.setLineDash([]);
                });

                ctx.strokeStyle = '#f97316';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(imgX, centerY); ctx.lineTo(imgX, centerY - imgH); ctx.stroke();
                ctx.setLineDash([]);
                drawArrow(imgX, centerY-imgH, 1, '#f97316');
                ctx.fillStyle = '#f97316';
                ctx.fillText('虛像', imgX - 15, centerY + 45);
            }

            const retinaX = eyeCenterX + eyeRadius - 10;
            let focusX = (imageDist <= farPoint) ? retinaX : crystalX + (retinaX - crystalX) * (farPoint / imageDist);

            rayOffsets.forEach(offset => {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(234, 179, 8, 0.8)';
                ctx.moveTo(crystalX, centerY + (offset * 0.8));
                ctx.lineTo(focusX, centerY);
                if (focusX < retinaX) {
                    const slope = (centerY - (centerY + (offset * 0.8))) / (focusX - crystalX);
                    ctx.lineTo(retinaX, centerY + (retinaX - focusX) * -slope);
                }
                ctx.stroke();
            });

            if (imageDist <= farPoint) {
                statusMsg.innerText = "✅ 狀態：清晰可見";
                statusMsg.className = "p-3 rounded text-sm font-medium bg-green-100 text-green-700 border border-green-200";
                if (thicknessFactor < 0.05) {
                    accMsg.innerText = "水晶體已拉至最薄，處於放鬆狀態";
                } else {
                    accMsg.innerText = `調節功能啟動，水晶體增厚中 (+${Math.round(thicknessFactor * 100)}%)`;
                }
            } else {
                statusMsg.innerText = "❌ 狀態：視線模糊";
                statusMsg.className = "p-3 rounded text-sm font-medium bg-red-50 text-red-700 border border-red-100";
                accMsg.innerText = "虛像超出遠點，晶體無法再變薄";
            }
        }

        function drawArrow(x, y, dir, color='#475569') {
            const size = 10;
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.moveTo(x - size/2, y + dir * size);
            ctx.lineTo(x, y);
            ctx.lineTo(x + size/2, y + dir * size);
            ctx.stroke();
        }

        [objInput, focalInput, farPointInput].forEach(el => el.addEventListener('input', draw));
        resize();
    </script>
</body>
</html>
