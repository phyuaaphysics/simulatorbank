<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波動質點振動模擬器 - 教學與出題版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', "Microsoft JhengHei", sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        .times-new-roman {
            font-family: "Times New Roman", Times, serif;
        }

        canvas {
            background: white;
            border: 1px solid #000;
            width: 100%;
        }

        .control-panel {
            background: #ffffff;
            padding: 1.25rem;
            border: 2px solid #000;
            border-radius: 8px;
        }

        .st-graph-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .label-style {
            font-family: "Times New Roman", Times, serif;
            font-weight: bold;
            font-style: italic;
        }

        .snap-btn {
            border: 1px solid #000;
            padding: 4px 8px;
            font-size: 11px;
            font-family: "Times New Roman", serif;
            font-style: italic;
            transition: all 0.2s;
        }

        .snap-btn:hover {
            background: #000;
            color: #fff;
        }

        .export-btn {
            background: #000;
            color: #fff;
            border: 1px solid #000;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 8px;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .export-btn:hover {
            opacity: 0.8;
        }

        input[type="range"] {
            cursor: pointer;
        }

        @media print {
            .no-print { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center border-b-2 border-black pb-4">
            <h1 class="text-2xl font-bold mb-1">波動與質點振動分析模擬器</h1>
            <p class="text-sm italic times-new-roman text-slate-600">空間波形圖 (y-x) 與 質點位移-時間圖 (s-t)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4 no-print">
                <div class="control-panel">
                    <h2 class="font-bold mb-3 text-sm border-b-2 border-black pb-1 uppercase">參數設定</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold mb-1">傳播方向 (v)：</label>
                            <div class="flex gap-4">
                                <label class="inline-flex items-center text-xs">
                                    <input type="radio" name="direction" value="right" checked class="form-radio text-black mr-1"> 向右
                                </label>
                                <label class="inline-flex items-center text-xs">
                                    <input type="radio" name="direction" value="left" class="form-radio text-black mr-1"> 向左
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">週期 Period (T) : <span id="valPeriod" class="times-new-roman italic">4.0</span> s</label>
                            <input type="range" id="periodRange" min="1" max="10" step="0.1" value="4.0" class="w-full accent-black">
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">波長 Wavelength (λ) : <span id="valWave" class="times-new-roman italic">200</span> px</label>
                            <input type="range" id="waveRange" min="100" max="400" value="200" class="w-full accent-black">
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">振幅 Amplitude (A)</label>
                            <input type="range" id="ampRange" min="10" max="60" value="40" class="w-full accent-black">
                        </div>
                    </div>

                    <div class="mt-6 border-t border-black pt-4">
                        <label class="block text-[10px] font-bold mb-2 uppercase">相位快照 (時間跳轉)</label>
                        <div class="grid grid-cols-3 gap-1">
                            <button onclick="snapTo(0)" class="snap-btn">t = 0</button>
                            <button onclick="snapTo(0.25)" class="snap-btn">0.25 T</button>
                            <button onclick="snapTo(0.5)" class="snap-btn">0.5 T</button>
                            <button onclick="snapTo(0.75)" class="snap-btn">0.75 T</button>
                            <button onclick="snapTo(1.0)" class="snap-btn">1.0 T</button>
                            <button id="playBtn" class="snap-btn bg-black text-white font-sans not-italic">播放</button>
                        </div>
                    </div>

                    <div class="mt-4 border-t border-black pt-4">
                        <button onclick="exportSnapshot()" class="export-btn">匯出當前快照 (HD PNG)</button>
                    </div>
                </div>

                <div class="bg-slate-50 p-3 border border-slate-300 text-[11px] leading-relaxed">
                    <p class="font-bold mb-1 underline">質點位置邏輯：</p>
                    <ul class="space-y-1 italic times-new-roman">
                        <li>A: x = 0 (平衡點)</li>
                        <li>B: x = 0.25 λ (t=0 時為波峰)</li>
                        <li>C: x = 0.50 λ (平衡點)</li>
                        <li>D: x = 0.75 λ (t=0 時為波谷)</li>
                        <li>E: x = 1.50 λ (平衡點)</li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="relative border-2 border-black" id="mainCanvasWrapper">
                    <canvas id="mainCanvas" height="260"></canvas>
                    
                    <!-- Propagation Indicator -->
                    <div id="dirIndicator" class="absolute top-4 right-4 flex flex-col items-end">
                        <span class="text-[10px] font-bold italic">波動傳播方向 (v)</span>
                        <svg id="arrowSvg" width="80" height="20" viewBox="0 0 80 20">
                            <line x1="0" y1="10" x2="70" y2="10" stroke="black" stroke-width="2" />
                            <polygon points="68,4 78,10 68,16" fill="black" />
                        </svg>
                    </div>

                    <div class="absolute bottom-2 left-2 text-[10px] font-bold border-l-2 border-black pl-1">
                        空間波形圖 (y-x)
                    </div>
                    
                    <!-- Time Indicator -->
                    <div class="absolute top-2 left-2 bg-black text-white px-2 py-1 text-xs times-new-roman">
                        當前時間 t = <span id="currentTimeDisplay">0.00</span> s
                    </div>
                </div>

                <!-- s-t Graphs Container -->
                <div class="st-graph-container" id="stContainer"></div>
            </div>
        </div>
    </div>

    <!-- Hidden canvas for export -->
    <canvas id="exportCanvas" style="display:none;"></canvas>

    <script>
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        const stContainer = document.getElementById('stContainer');
        const currentTimeDisplay = document.getElementById('currentTimeDisplay');
        const arrowSvg = document.getElementById('arrowSvg');
        
        const config = {
            amplitude: 40,
            wavelength: 200,
            period: 4.0,
            direction: 1, // 1 for right, -1 for left
            startX: 60,
            points: [
                { id: 'A', lambdaOffset: 0.0 },
                { id: 'B', lambdaOffset: 0.25 },
                { id: 'C', lambdaOffset: 0.5 },
                { id: 'D', lambdaOffset: 0.75 },
                { id: 'E', lambdaOffset: 1.5 }
            ]
        };

        let currentTime = 0;
        let isPaused = true;
        let lastTimestamp = 0;

        // Create s-t chart objects
        const stCtxs = config.points.map((p, index) => {
            const card = document.createElement('div');
            card.className = 'bg-white p-2 border border-black flex flex-col items-center';
            card.innerHTML = `
                <div class="w-full flex justify-between items-center mb-1 border-b border-black">
                    <span class="label-style text-lg">${p.id}</span>
                    <span class="text-[9px] font-bold">s-t (1 週期)</span>
                </div>
                <canvas id="stCanvas_${index}" height="120"></canvas>
            `;
            stContainer.appendChild(card);
            const canv = document.getElementById(`stCanvas_${index}`);
            return { canvas: canv, ctx: canv.getContext('2d'), point: p };
        });

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const containers = [
                { canv: mainCanvas, parent: mainCanvas.parentElement },
                ...stCtxs.map(obj => ({ canv: obj.canvas, parent: obj.canvas.parentElement }))
            ];

            containers.forEach(item => {
                const rect = item.parent.getBoundingClientRect();
                const width = rect.width || 300;
                item.canv.width = width * dpr;
                item.canv.height = parseInt(item.canv.getAttribute('height')) * dpr;
                const c = item.canv.getContext('2d');
                c.setTransform(1, 0, 0, 1, 0, 0); // Reset
                c.scale(dpr, dpr);
            });
        }

        window.addEventListener('resize', resize);
        setTimeout(resize, 100);

        function getDisplacement(x, t) {
            const k = (2 * Math.PI) / config.wavelength;
            const omega = (2 * Math.PI) / config.period;
            const phase = k * (x - config.startX) - (config.direction * omega * t);
            return config.amplitude * Math.sin(phase);
        }

        function snapTo(phaseRatio) {
            currentTime = phaseRatio * config.period;
            isPaused = true;
            updatePlayButtonUI();
        }

        function updatePlayButtonUI() {
            const btn = document.getElementById('playBtn');
            btn.textContent = isPaused ? "播放" : "暫停";
            btn.style.background = isPaused ? "#22c55e" : "#000"; 
        }

        function animate(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;

            if (!isPaused) {
                currentTime += deltaTime;
                if (currentTime > config.period) currentTime = 0;
            }
            
            currentTimeDisplay.textContent = currentTime.toFixed(2);

            drawMainWave(ctx, mainCanvas);
            stCtxs.forEach(obj => drawSTGraph(obj.ctx, obj.canvas, obj.point));

            requestAnimationFrame(animate);
        }

        function drawMainWave(targetCtx, targetCanvas) {
            const dpr = 1; // Handled by scale outside if needed
            const w = targetCanvas.width / (window.devicePixelRatio || 1);
            const h = targetCanvas.height / (window.devicePixelRatio || 1);
            const centerY = h / 2;
            
            targetCtx.clearRect(0, 0, w, h);

            // Equilibrium Reference Line
            targetCtx.setLineDash([5, 5]);
            targetCtx.strokeStyle = '#cccccc';
            targetCtx.beginPath();
            targetCtx.moveTo(0, centerY);
            targetCtx.lineTo(w, centerY);
            targetCtx.stroke();
            targetCtx.setLineDash([]);

            // Waveform
            targetCtx.beginPath();
            targetCtx.lineWidth = 1.5;
            targetCtx.strokeStyle = '#000000';
            for (let x = 0; x <= w; x++) {
                const y = getDisplacement(x, currentTime);
                if (x === 0) targetCtx.moveTo(x, centerY + y);
                else targetCtx.lineTo(x, centerY + y);
            }
            targetCtx.stroke();

            // Particles ABCDE
            config.points.forEach((p) => {
                const px = config.startX + (p.lambdaOffset * config.wavelength);
                const py = getDisplacement(px, currentTime);
                
                if (px >= 0 && px <= w) {
                    targetCtx.fillStyle = '#000000';
                    targetCtx.beginPath();
                    targetCtx.arc(px, centerY + py, 5, 0, Math.PI * 2);
                    targetCtx.fill();
                    
                    targetCtx.font = 'italic bold 20px "Times New Roman"';
                    targetCtx.textAlign = 'center';
                    targetCtx.fillText(p.id, px, centerY + py - 12);
                }
            });
        }

        function drawSTGraph(sCtx, sCanvas, p) {
            const w = sCanvas.width / (window.devicePixelRatio || 1);
            const h = sCanvas.height / (window.devicePixelRatio || 1);
            const sCenterY = h / 2;

            sCtx.clearRect(0, 0, w, h);

            // Axis
            sCtx.strokeStyle = '#eeeeee';
            sCtx.beginPath();
            sCtx.moveTo(0, sCenterY);
            sCtx.lineTo(w, sCenterY);
            sCtx.stroke();
            
            sCtx.strokeStyle = '#000000';
            sCtx.lineWidth = 0.5;
            sCtx.strokeRect(0, 0, w, h);

            // Plot full period
            sCtx.beginPath();
            sCtx.lineWidth = 1.2;
            sCtx.strokeStyle = '#000000';
            const px = config.startX + (p.lambdaOffset * config.wavelength);
            for (let tStep = 0; tStep <= w; tStep++) {
                const t = (tStep / w) * config.period;
                const disp = getDisplacement(px, t);
                if (tStep === 0) sCtx.moveTo(tStep, sCenterY + disp);
                else sCtx.lineTo(tStep, sCenterY + disp);
            }
            sCtx.stroke();

            // Current Time Cursor
            const cursorX = (currentTime / config.period) * w;
            sCtx.setLineDash([2, 2]);
            sCtx.strokeStyle = '#999';
            sCtx.beginPath();
            sCtx.moveTo(cursorX, 0);
            sCtx.lineTo(cursorX, h);
            sCtx.stroke();
            sCtx.setLineDash([]);

            // Current State Dot
            const currentDisp = getDisplacement(px, currentTime);
            sCtx.fillStyle = '#000';
            sCtx.beginPath();
            sCtx.arc(cursorX, sCenterY + currentDisp, 3.5, 0, Math.PI * 2);
            sCtx.fill();

            sCtx.font = '9px "Times New Roman"';
            sCtx.fillStyle = '#000';
            sCtx.fillText("0", 2, h - 4);
            sCtx.fillText("T", w - 10, h - 4);
        }

        function exportSnapshot() {
            const exportCanvas = document.getElementById('exportCanvas');
            const eCtx = exportCanvas.getContext('2d');
            const scale = 2; // HD export
            
            const mainW = mainCanvas.width / (window.devicePixelRatio || 1);
            const mainH = mainCanvas.height / (window.devicePixelRatio || 1);
            const stW = stCtxs[0].canvas.width / (window.devicePixelRatio || 1);
            const stH = stCtxs[0].canvas.height / (window.devicePixelRatio || 1);
            
            // Layout Calculation
            const margin = 40;
            const gap = 20;
            const totalW = Math.max(mainW, (stW * 5) + (gap * 4)) + margin * 2;
            const totalH = mainH + stH + margin * 3 + 60; // Extra space for titles

            exportCanvas.width = totalW * scale;
            exportCanvas.height = totalH * scale;
            eCtx.scale(scale, scale);

            // Background
            eCtx.fillStyle = '#ffffff';
            eCtx.fillRect(0, 0, totalW, totalH);

            // Title
            eCtx.fillStyle = '#000000';
            eCtx.font = 'bold 24px "Microsoft JhengHei"';
            eCtx.textAlign = 'center';
            eCtx.fillText("波動與質點振動物理分析快照", totalW / 2, margin + 10);
            
            eCtx.font = 'italic 14px "Times New Roman"';
            eCtx.fillText(`當前時刻 t = ${currentTime.toFixed(2)} s | 週期 T = ${config.period.toFixed(1)} s | 傳播方向: ${config.direction === 1 ? '向右' : '向左'}`, totalW / 2, margin + 35);

            // Draw Main Wave
            eCtx.save();
            eCtx.translate(margin, margin + 60);
            // Re-draw wave on this context
            const centerY = mainH / 2;
            eCtx.strokeStyle = '#000';
            eCtx.lineWidth = 1;
            eCtx.strokeRect(0, 0, mainW, mainH);
            
            eCtx.setLineDash([5, 5]);
            eCtx.strokeStyle = '#ccc';
            eCtx.beginPath(); eCtx.moveTo(0, centerY); eCtx.lineTo(mainW, centerY); eCtx.stroke();
            eCtx.setLineDash([]);
            
            eCtx.strokeStyle = '#000';
            eCtx.lineWidth = 2;
            eCtx.beginPath();
            for (let x = 0; x <= mainW; x++) {
                const y = getDisplacement(x, currentTime);
                if (x === 0) eCtx.moveTo(x, centerY + y);
                else eCtx.lineTo(x, centerY + y);
            }
            eCtx.stroke();

            // Direction Arrow on Export
            eCtx.font = 'italic bold 12px "Times New Roman"';
            eCtx.textAlign = 'right';
            eCtx.fillText("v", mainW - 10, 20);
            eCtx.beginPath();
            if(config.direction === 1) {
                eCtx.moveTo(mainW-60, 25); eCtx.lineTo(mainW-15, 25);
                eCtx.lineTo(mainW-20, 20); eCtx.moveTo(mainW-15, 25); eCtx.lineTo(mainW-20, 30);
            } else {
                eCtx.moveTo(mainW-15, 25); eCtx.lineTo(mainW-60, 25);
                eCtx.lineTo(mainW-55, 20); eCtx.moveTo(mainW-60, 25); eCtx.lineTo(mainW-55, 30);
            }
            eCtx.stroke();

            // Points
            config.points.forEach((p) => {
                const px = config.startX + (p.lambdaOffset * config.wavelength);
                const py = getDisplacement(px, currentTime);
                if (px >= 0 && px <= mainW) {
                    eCtx.fillStyle = '#000';
                    eCtx.beginPath(); eCtx.arc(px, centerY + py, 6, 0, Math.PI * 2); eCtx.fill();
                    eCtx.font = 'italic bold 22px "Times New Roman"';
                    eCtx.textAlign = 'center';
                    eCtx.fillText(p.id, px, centerY + py - 15);
                }
            });
            eCtx.restore();

            // Draw ST Graphs
            stCtxs.forEach((obj, i) => {
                eCtx.save();
                const xPos = margin + (i * (stW + gap));
                const yPos = margin + 60 + mainH + gap;
                eCtx.translate(xPos, yPos);
                
                const p = obj.point;
                const sCenterY = stH / 2;
                eCtx.strokeStyle = '#000';
                eCtx.strokeRect(0, 0, stW, stH);
                
                eCtx.font = 'bold italic 16px "Times New Roman"';
                eCtx.fillText(p.id, stW/2, -5);

                eCtx.beginPath();
                eCtx.lineWidth = 1.5;
                const px = config.startX + (p.lambdaOffset * config.wavelength);
                for (let tStep = 0; tStep <= stW; tStep++) {
                    const t = (tStep / stW) * config.period;
                    const disp = getDisplacement(px, t);
                    if (tStep === 0) eCtx.moveTo(tStep, sCenterY + disp);
                    else eCtx.lineTo(tStep, sCenterY + disp);
                }
                eCtx.stroke();

                const cursorX = (currentTime / config.period) * stW;
                eCtx.setLineDash([2, 2]); eCtx.strokeStyle = '#999';
                eCtx.beginPath(); eCtx.moveTo(cursorX, 0); eCtx.lineTo(cursorX, stH); eCtx.stroke();
                eCtx.setLineDash([]);
                
                const curD = getDisplacement(px, currentTime);
                eCtx.fillStyle = '#000';
                eCtx.beginPath(); eCtx.arc(cursorX, sCenterY + curD, 4, 0, Math.PI * 2); eCtx.fill();
                eCtx.restore();
            });

            // Trigger Download
            const link = document.createElement('a');
            link.download = `wave_snapshot_t${currentTime.toFixed(2)}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        }

        document.getElementById('ampRange').addEventListener('input', (e) => config.amplitude = parseInt(e.target.value));
        document.getElementById('waveRange').addEventListener('input', (e) => {
            config.wavelength = parseInt(e.target.value);
            document.getElementById('valWave').textContent = config.wavelength;
        });
        document.getElementById('periodRange').addEventListener('input', (e) => {
            config.period = parseFloat(e.target.value);
            document.getElementById('valPeriod').textContent = config.period.toFixed(1);
        });

        document.getElementsByName('direction').forEach(radio => {
            radio.addEventListener('change', (e) => {
                config.direction = e.target.value === 'right' ? 1 : -1;
                if (config.direction === 1) {
                    arrowSvg.innerHTML = '<line x1="0" y1="10" x2="70" y2="10" stroke="black" stroke-width="2" /><polygon points="68,4 78,10 68,16" fill="black" />';
                } else {
                    arrowSvg.innerHTML = '<line x1="80" y1="10" x2="10" y2="10" stroke="black" stroke-width="2" /><polygon points="12,4 2,10 12,16" fill="black" />';
                }
            });
        });
        
        document.getElementById('playBtn').addEventListener('click', function() {
            isPaused = !isPaused;
            updatePlayButtonUI();
        });

        window.onload = () => {
            updatePlayButtonUI();
            requestAnimationFrame(animate);
        };
    </script>
</body>
</html>
