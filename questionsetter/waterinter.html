<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水波干涉實驗模擬 (試卷專用版)</title>
    <style>
        :root {
            --primary-color: #000000;
            --bg-color: #ffffff;
            --text-main: #000000;
            --border-color: #000000;
        }

        body { 
            font-family: "Times New Roman", serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: var(--bg-color); 
            min-height: 100vh;
            margin: 0; padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: 900px; width: 100%; 
            background: #fff;
            padding: 30px; border: 1.5px solid var(--border-color); 
            box-sizing: border-box;
        }

        h1 { margin: 0 0 5px 0; text-align: center; font-size: 1.6rem; font-weight: bold; }
        .subtitle { text-align: center; font-size: 0.9rem; margin-bottom: 20px; }

        .legend-box {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 20px; 
            padding: 10px; border: 1px solid #000; font-size: 13px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #000; }
        .peak-peak { background: #000; } 
        .trough-trough { background: #fff; } 
        .peak-trough { background: #999; } 

        .canvas-container {
            position: relative; border: 1.5px solid #000; background: #fff;
            touch-action: none; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: auto; cursor: crosshair; }

        .controls { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; margin-top: 20px; padding: 15px; border-top: 1px solid #000;
        }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .control-label { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        
        input[type=range] { width: 100%; cursor: pointer; }
        input[type=number], input[type=text] { 
            padding: 5px; border: 1px solid #000; font-family: "Times New Roman", serif; font-size: 14px;
        }

        .info-panel {
            margin-top: 15px; padding: 15px; border: 1px dashed #000;
            font-size: 15px; line-height: 1.6;
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .data-val { font-weight: bold; font-family: "Times New Roman", serif; }
        .status-badge {
            display: inline-block; padding: 2px 10px; border: 1px solid #000; font-weight: bold; font-size: 14px; margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>物理科實驗模擬：水波干涉 (出卷專用)</h1>
    <div class="subtitle">Analysis of Interference Patterns - Exam Generation Tool</div>
    
    <div class="legend-box">
        <div class="legend-item"><div class="dot peak-peak"></div> 腹點 (Peak-Peak)</div>
        <div class="legend-item"><div class="dot trough-trough"></div> 腹點 (Trough-Trough)</div>
        <div class="legend-item"><div class="dot peak-trough"></div> 節點 (Peak-Trough)</div>
    </div>

    <div class="canvas-container">
        <canvas id="rippleCanvas" width="800" height="520"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <div class="control-label">
                <span>波長 Wavelength (λ)</span>
                <span><span id="lambdaVal" class="data-val">1.25</span> cm</span>
            </div>
            <input type="range" id="lambdaInput" min="0.5" max="3.0" step="0.05" value="1.25">
            
            <div class="control-label">
                <span>波源間距 Distance (d)</span>
                <span><span id="distVal" class="data-val">4.0</span> cm</span>
            </div>
            <input type="range" id="distInput" min="1.0" max="10.0" step="0.1" value="4.0">
        </div>

        <div class="control-group">
            <div class="control-label">顯示特定 n 值 (例如: 0, 1, -1, 0.5)</div>
            <input type="text" id="nInput" placeholder="輸入 n 值後按 Enter" value="">
            <div style="font-size: 12px; color: #555;">(整數為腹線，.5 為節線)</div>
        </div>
    </div>

    <div id="analysis" class="info-panel">
        <div style="text-align: center;">Click on canvas to snap point P to nearest wavefront intersection</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('rippleCanvas');
    const ctx = canvas.getContext('2d');
    const analysis = document.getElementById('analysis');
    const PX_PER_CM = 40;

    let config = {
        lambda: 1.25,
        d: 4.0,
        targetN: null,
        p: null 
    };

    const bind = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('input', () => {
            config[key] = parseFloat(el.value);
            document.getElementById(id.replace('Input', 'Val')).innerText = config[key].toFixed(2);
            draw();
        });
    };

    bind('lambdaInput', 'lambda');
    bind('distInput', 'd');

    document.getElementById('nInput').addEventListener('change', (e) => {
        const val = parseFloat(e.target.value);
        config.targetN = isNaN(val) ? null : val;
        draw();
    });

    const handlePointer = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const mouseX = (clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (clientY - rect.top) * (canvas.height / rect.height);

        const cx = canvas.width / 2, cy = canvas.height * 0.85;
        const s1 = { x: cx - (config.d * PX_PER_CM) / 2, y: cy };
        const s2 = { x: cx + (config.d * PX_PER_CM) / 2, y: cy };

        // Find nearest interference point (intersection of wavefronts)
        const step = (config.lambda * PX_PER_CM) / 2;
        const maxR = 1000;
        let minDist = Infinity;
        let bestPt = null;

        for (let r1 = step; r1 < maxR; r1 += step) {
            for (let r2 = step; r2 < maxR; r2 += step) {
                if (Math.abs(r1 - r2) > (config.d * PX_PER_CM) + 1) continue;
                const pts = circleIntersection(s1.x, s1.y, r1, s2.x, s2.y, r2);
                pts.forEach(pt => {
                    if (pt.y < cy + 10) {
                        const d = Math.sqrt((pt.x - mouseX)**2 + (pt.y - mouseY)**2);
                        if (d < minDist) {
                            minDist = d;
                            bestPt = pt;
                        }
                    }
                });
            }
        }

        if (bestPt) config.p = bestPt;
        draw();
    };

    canvas.addEventListener('mousedown', handlePointer);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointer(e); }, {passive: false});

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2, cy = canvas.height * 0.85;
        const d_px = config.d * PX_PER_CM, lambda_px = config.lambda * PX_PER_CM;
        const s1 = { x: cx - d_px / 2, y: cy }, s2 = { x: cx + d_px / 2, y: cy };

        // 1. Background Wavefronts (Black, solid/dash)
        [s1, s2].forEach(s => {
            for (let r = lambda_px / 2; r < 1000; r += lambda_px / 2) {
                const isPeak = Math.round(r / (lambda_px / 2)) % 2 === 0;
                ctx.beginPath();
                ctx.setLineDash(isPeak ? [] : [2, 4]); 
                ctx.strokeStyle = '#000'; 
                ctx.lineWidth = 0.5; 
                ctx.arc(s.x, s.y, r, Math.PI, 2 * Math.PI);
                ctx.stroke();
            }
        });

        // 2. Hyperbolas (Interference Lines - All Solid Black)
        const drawHyperbola = (pd_cm, index, isTarget = false) => {
            if (Math.abs(pd_cm) >= config.d) return;
            ctx.beginPath();
            ctx.setLineDash([]);
            ctx.strokeStyle = '#000'; 
            ctx.lineWidth = isTarget ? 3 : 1.2; 
            
            const a = (Math.abs(pd_cm) / 2) * PX_PER_CM, c = (config.d / 2) * PX_PER_CM;
            let labelX, labelY;

            if (a < 0.2) {
                ctx.moveTo(cx, 0); ctx.lineTo(cx, cy);
                labelX = cx; labelY = 30;
            } else {
                const b = Math.sqrt(c * c - a * a), sign = pd_cm > 0 ? 1 : -1;
                for (let t = -4; t <= 4; t += 0.05) {
                    const px = cx + sign * a * Math.cosh(t), py = cy - b * Math.sinh(t);
                    if (py < cy + 5) { 
                        if (t === -4) ctx.moveTo(px, py); else ctx.lineTo(px, py); 
                        if (t.toFixed(2) == "3.50") { labelX = px; labelY = py; }
                    }
                }
            }
            ctx.stroke();

            // Label Ln
            ctx.fillStyle = "#000";
            ctx.font = "italic 16px 'Times New Roman'";
            const label = `L${index}`;
            if (labelX) ctx.fillText(label, labelX - 10, labelY - 10);
        };

        // Draw all lines or specific lines
        const maxN = Math.floor(config.d / config.lambda);
        for (let n = -maxN; n <= maxN; n++) {
            if (config.targetN === null || config.targetN === n) drawHyperbola(n * config.lambda, n, config.targetN === n);
        }
        for (let n = -maxN - 1; n <= maxN; n++) {
            const nodalN = n + 0.5;
            if (config.targetN === null || config.targetN === nodalN) drawHyperbola(nodalN * config.lambda, nodalN, config.targetN === nodalN);
        }

        ctx.setLineDash([]);
        [s1, s2].forEach((s, i) => {
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.font = "italic 20px 'Times New Roman'";
            ctx.fillText("S", s.x - 12, s.y + 30);
            ctx.font = "bold 12px 'Times New Roman'";
            ctx.fillText(i + 1, s.x + 2, s.y + 35); // Subscript 1 or 2
        });

        if (config.p) {
            const r1 = Math.sqrt((config.p.x - s1.x)**2 + (config.p.y - s1.y)**2);
            const r2 = Math.sqrt((config.p.x - s2.x)**2 + (config.p.y - s2.y)**2);
            const step_px = (config.lambda * PX_PER_CM) / 2;
            const p1Peak = Math.round(r1/step_px) % 2 === 0;
            const p2Peak = Math.round(r2/step_px) % 2 === 0;

            // Visual for Point P
            ctx.fillStyle = '#000';
            if (!p1Peak && !p2Peak) {
                ctx.fillStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(config.p.x, config.p.y, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            } else if (p1Peak !== p2Peak) {
                ctx.fillStyle = '#999';
                ctx.beginPath(); ctx.arc(config.p.x, config.p.y, 5, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath(); ctx.arc(config.p.x, config.p.y, 6, 0, Math.PI*2); ctx.fill();
            }

            ctx.fillStyle = '#000';
            ctx.font = "italic bold 22px 'Times New Roman'";
            ctx.fillText("P", config.p.x + 12, config.p.y - 12);
            
            updateStats(s1, s2);
        }
    }

    function circleIntersection(x0, y0, r0, x1, y1, r1) {
        let dx = x1 - x0, dy = y1 - y0, d = Math.sqrt(dx*dx + dy*dy);
        if (d > r0 + r1 || d < Math.abs(r0 - r1) || d === 0) return [];
        let a = (r0*r0 - r1*r1 + d*d) / (2*d), h = Math.sqrt(Math.max(0, r0*r0 - a*a));
        let x2 = x0 + a*dx/d, y2 = y0 + a*dy/d;
        return [{x: x2 + h*dy/d, y: y2 - h*dx/d}, {x: x2 - h*dy/d, y: y2 + h*dx/d}];
    }

    function updateStats(s1, s2) {
        const r1 = Math.sqrt((config.p.x - s1.x)**2 + (config.p.y - s1.y)**2) / PX_PER_CM;
        const r2 = Math.sqrt((config.p.x - s2.x)**2 + (config.p.y - s2.y)**2) / PX_PER_CM;
        const pd = Math.abs(r1 - r2);
        const n = pd / config.lambda;
        
        const step_px = (config.lambda * PX_PER_CM) / 2;
        const p1Peak = Math.round((r1 * PX_PER_CM) / step_px) % 2 === 0;
        const p2Peak = Math.round((r2 * PX_PER_CM) / step_px) % 2 === 0;

        let statusText = "General Point";
        if (p1Peak && p2Peak) statusText = "Antinode (Peak+Peak)";
        else if (!p1Peak && !p2Peak) statusText = "Antinode (Trough+Trough)";
        else statusText = "Node (Peak+Trough)";

        analysis.innerHTML = `
            <div class="data-row">
                <span>Path Length PS<sub>1</sub> / PS<sub>2</sub>:</span>
                <span><span class="data-val">${r1.toFixed(2)}</span> / <span class="data-val">${r2.toFixed(2)}</span> cm</span>
            </div>
            <div class="data-row">
                <span>Path Difference Δr = |PS<sub>1</sub> - PS<sub>2</sub>|:</span>
                <span><span class="data-val">${pd.toFixed(2)}</span> cm</span>
            </div>
            <div class="data-row">
                <span>Condition:</span>
                <span>Δr = <span class="data-val">${n.toFixed(1)}</span> λ</span>
            </div>
            <div style="text-align: center;">
                <span class="status-badge">${statusText}</span>
            </div>
        `;
    }

    window.onload = draw;
</script>

</body>
</html>
