<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>速度選擇器模擬器 - 視覺優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        canvas { background-color: white; border: 1.5px solid #000; cursor: crosshair; image-rendering: auto; }
        .controls-panel { background: white; padding: 1.2rem; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-4 text-center">
            <h1 class="text-2xl font-bold text-gray-800">速度選擇器 (視覺優化版)</h1>
            <p class="text-gray-600 text-sm">強化磁場符號辨識度，優化細部框線比例</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="controls-panel">
                    <h2 class="font-bold border-b pb-2 mb-4">物理參數</h2>
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase">電場強度 E</label>
                        <input type="range" id="eField" min="0" max="100" value="50" class="w-full">
                        <div class="flex justify-between text-xs mt-1"><span id="vE">50</span></div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase">磁場強度 B</label>
                        <input type="range" id="bField" min="0" max="100" value="50" class="w-full">
                        <div class="flex justify-between text-xs mt-1"><span id="vB">50</span></div>
                    </div>
                    <div class="mb-6">
                        <label class="block text-xs font-bold text-gray-500 uppercase">初速度 v</label>
                        <input type="range" id="velocity" min="0" max="200" value="100" class="w-full">
                        <div class="flex justify-between text-xs mt-1"><span id="vV">100</span></div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button id="runBtn" class="bg-blue-600 text-white py-2 rounded font-bold">開始投射</button>
                        <button id="resetBtn" class="bg-gray-200 py-2 rounded font-bold">重置位置</button>
                    </div>
                </div>

                <div class="controls-panel">
                    <h2 class="font-bold border-b pb-2 mb-4">輸出設定</h2>
                    <label class="flex items-center gap-2 cursor-pointer mb-4">
                        <input type="checkbox" id="monoToggle" class="w-4 h-4">
                        <span class="text-sm font-medium">考卷黑白模式</span>
                    </label>
                    <button id="downloadBtn" class="w-full border-2 border-black py-2 rounded font-bold hover:bg-black hover:text-white transition text-sm">導出圖片 (PNG)</button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-white p-2 border border-gray-300 rounded shadow-inner">
                    <canvas id="simCanvas" width="800" height="500" class="w-full h-auto"></canvas>
                </div>
                <div class="mt-4 grid grid-cols-3 gap-2 text-center text-[10px] font-bold uppercase tracking-wider">
                    <div class="p-2 bg-red-50 rounded border border-red-100 text-red-600">點擊電極板切換極性</div>
                    <div class="p-2 bg-blue-50 rounded border border-blue-100 text-blue-600">點擊磁場區域切換方向</div>
                    <div class="p-2 bg-green-50 rounded border border-green-100 text-green-600">滑鼠拖曳電荷調整位置</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        // 狀態變數
        let eStrength = 50;
        let bStrength = 50;
        let initV = 100;
        let plateTop = 1; 
        let plateBottom = -1;
        let bDirection = 1; // 1: ✕, -1: ●
        let isMono = false;
        let isAnimating = false;
        let isDragging = false;

        let particle = { x: 120, y: 250, vx: 100, vy: 0 };
        let path = [];

        function init() {
            bindEvents();
            draw();
        }

        function bindEvents() {
            document.getElementById('eField').addEventListener('input', e => { eStrength = e.target.value; document.getElementById('vE').innerText = eStrength; draw(); });
            document.getElementById('bField').addEventListener('input', e => { bStrength = e.target.value; document.getElementById('vB').innerText = bStrength; draw(); });
            document.getElementById('velocity').addEventListener('input', e => { initV = parseFloat(e.target.value); document.getElementById('vV').innerText = initV; particle.vx = initV; draw(); });
            
            document.getElementById('monoToggle').addEventListener('change', e => { isMono = e.target.checked; draw(); });
            document.getElementById('resetBtn').addEventListener('click', reset);
            document.getElementById('runBtn').addEventListener('click', startSim);
            document.getElementById('downloadBtn').addEventListener('click', downloadImage);

            canvas.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
        }

        function handleMouseDown(e) {
            if (isAnimating) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            const dist = Math.hypot(mx - particle.x, my - particle.y);
            if (dist < 20) {
                isDragging = true;
                return;
            }

            if (mx > 180 && mx < 680 && my > 100 && my < 130) {
                plateTop = plateTop === 1 ? -1 : (plateTop === -1 ? 0 : 1);
                draw(); return;
            }
            if (mx > 180 && mx < 680 && my > 370 && my < 400) {
                plateBottom = plateBottom === 1 ? -1 : (plateBottom === -1 ? 0 : 1);
                draw(); return;
            }
            if (mx > 180 && mx < 680 && my > 130 && my < 370) {
                bDirection *= -1;
                draw(); return;
            }
        }

        function handleMouseMove(e) {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            particle.x = (e.clientX - rect.left) * scaleX;
            particle.y = (e.clientY - rect.top) * scaleY;
            path = [];
            draw();
        }

        function handleMouseUp() { isDragging = false; }

        function reset() {
            isAnimating = false;
            particle = { x: 120, y: 250, vx: initV, vy: 0 };
            path = [];
            draw();
        }

        function startSim() {
            if(isAnimating) return;
            path = [{x: particle.x, y: particle.y}];
            isAnimating = true;
            animate();
        }

        function animate() {
            if (!isAnimating) return;
            let effectiveE = (plateTop === 1 ? 1 : (plateTop === -1 ? -1 : 0)) - (plateBottom === 1 ? 1 : (plateBottom === -1 ? -1 : 0));
            const Fe = (eStrength / 10) * effectiveE;
            const Fb = (particle.vx / 50) * (bStrength / 10) * bDirection;
            const ay = (Fe + Fb) * 0.1;
            particle.vy += ay;
            particle.x += particle.vx * 0.05;
            particle.y += particle.vy * 0.05;
            path.push({x: particle.x, y: particle.y});
            draw();
            if (particle.x > canvas.width || particle.x < 0 || particle.y < 0 || particle.y > canvas.height) {
                isAnimating = false;
            } else {
                requestAnimationFrame(animate);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 繪製磁場 (對稱佈置，於 x=180~680 範圍內)
            ctx.fillStyle = isMono ? "#000" : "#6b7280";
            ctx.textAlign = "center";
            
            const startX = 180;
            const endX = 680;
            const countX = 9;
            const countY = 4;
            const spacingX = (endX - startX) / (countX);
            const spacingY = (370 - 130) / (countY + 1);

            for(let i=1; i <= countX; i++) {
                for(let j=1; j <= countY; j++) {
                    const cx = startX + i * (endX - startX) / (countX + 1);
                    const cy = 130 + j * spacingY;
                    if (bDirection === 1) {
                        ctx.font = "bold 22px Arial";
                        ctx.fillText("✕", cx, cy + 8);
                    } else {
                        ctx.beginPath();
                        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            ctx.textAlign = "left";
            ctx.font = "bold 18px Arial";
            ctx.fillStyle = "#000";
            ctx.fillText(`B ${bDirection === 1 ? '(into page)' : '(out of page)'}`, 410, 85);

            // 2. 繪製板子 (維持相同框線)
            drawPlate(180, 100, plateTop);
            drawPlate(180, 370, plateBottom);

            // 3. 繪製源頭 (框線幼)
            ctx.lineWidth = 1;
            ctx.strokeStyle = "#000";
            ctx.strokeRect(20, 230, 60, 40);
            ctx.font = "12px Arial";
            ctx.fillText("Source", 30, 225);

            // 4. 繪製軌跡
            if (path.length > 1) {
                ctx.beginPath();
                ctx.setLineDash([]);
                ctx.strokeStyle = isMono ? "#000" : "#fbbf24";
                ctx.lineWidth = 2.5;
                ctx.moveTo(path[0].x, path[0].y);
                path.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }

            // 5. 繪製粒子 (框線幼)
            ctx.lineWidth = 1; 
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, 11, 0, Math.PI*2);
            ctx.fillStyle = isMono ? "white" : "#ef4444";
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.stroke();
            ctx.fillStyle = "#000";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText("+", particle.x, particle.y + 5);
            ctx.textAlign = "left";
            
            // 速度箭頭
            if(!isAnimating) {
                drawArrow(particle.x + 12, particle.y, particle.x + 55, particle.y, 1.5, "#000");
                ctx.font = "italic 14px serif";
                ctx.fillText("v", particle.x + 35, particle.y - 8);
            }
        }

        function drawPlate(x, y, state) {
            ctx.lineWidth = 1;
            ctx.setLineDash([]);
            
            const bgPositive = isMono ? "#fff" : "#fee2e2";
            const bgNegative = isMono ? "#fff" : "#dbeafe";
            const bgNone = "#fff";

            if (state === 0) {
                ctx.strokeStyle = "#000"; // 維持相同框線
                ctx.fillStyle = bgNone;
                ctx.fillRect(x, y, 500, 30);
                ctx.strokeRect(x, y, 500, 30);
            } else {
                ctx.fillStyle = state === 1 ? bgPositive : bgNegative;
                ctx.strokeStyle = "#000";
                ctx.fillRect(x, y, 500, 30);
                ctx.strokeRect(x, y, 500, 30);
                ctx.fillStyle = "#000";
                ctx.font = "14px Arial";
                const sign = state === 1 ? "+" : "-";
                for(let i=0; i<10; i++) ctx.fillText(sign, x + 15 + i*50, y + 20);
            }
        }

        function drawArrow(x1, y1, x2, y2, width, color) {
            const headlen = 8;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.save();
            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = width;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 7), y2 - headlen * Math.sin(angle - Math.PI / 7));
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 7), y2 - headlen * Math.sin(angle + Math.PI / 7));
            ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'velocity_selector_diagram.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        init();
    </script>
</body>
</html>
