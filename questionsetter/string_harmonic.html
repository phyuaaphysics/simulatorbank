<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弦線駐波擬題模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        body { font-family: 'Inter', -apple-system, sans-serif; }

        /* 設置學術字體：優先使用 Times New Roman 和新細明體 */
        .academic-font { 
            font-family: "Times New Roman", "PMingLiU", "新細明體", serif; 
        }

        .canvas-container { 
            background-color: #f8fafc; 
            border: 1px solid #e2e8f0; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 重物的斜線圖案樣式 */
        .dashed-pattern { fill: url(#diagonalHatch); }

        input[type="range"] {
            accent-color: #2563eb;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800">弦線駐波擬題模擬器</h1>
            <p class="text-gray-600 mt-2">根據 image_2c31c0.png 設計，支持字法調節與高清導出。</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit">
                <h2 class="text-xl font-semibold mb-6 flex items-center text-gray-700">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    參數設置
                </h2>

                <div class="space-y-5">
                    <!-- 諧波次數 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">諧波次數 (n = <span id="n-val" class="text-blue-600 font-bold">2</span>)</label>
                        <input type="range" id="harmonic" min="1" max="8" step="1" value="2" class="w-full h-2 bg-gray-200 rounded-lg cursor-pointer">
                    </div>

                    <!-- 橋碼位置 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">橋碼 Y 左右位置</label>
                        <input type="range" id="bridgeY" min="300" max="800" step="5" value="700" class="w-full h-2 bg-gray-200 rounded-lg cursor-pointer">
                    </div>

                    <!-- 振幅 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">波幅 (Amplitude)</label>
                        <input type="range" id="amplitude" min="5" max="60" step="1" value="30" class="w-full h-2 bg-gray-200 rounded-lg cursor-pointer">
                    </div>

                    <!-- 字號調節 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">標籤字號 (<span id="fs-val">20</span>px)</label>
                        <input type="range" id="fontSize" min="12" max="40" step="1" value="22" class="w-full h-2 bg-gray-200 rounded-lg cursor-pointer">
                    </div>

                    <div class="border-t border-gray-100 pt-4 space-y-3">
                        <label class="block text-sm font-medium text-gray-700">文字編輯</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="labelX" value="X" placeholder="左標籤" class="p-2 border rounded-md text-sm academic-font">
                            <input type="text" id="labelY" value="Y" placeholder="右標籤" class="p-2 border rounded-md text-sm academic-font">
                        </div>
                        <input type="text" id="labelW" value="重量" placeholder="重物標籤" class="w-full p-2 border rounded-md text-sm academic-font">
                    </div>

                    <div class="pt-2 space-y-3">
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox" id="showDashed" checked class="sr-only peer">
                            <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5 relative"></div>
                            <span class="ml-3 text-sm text-gray-600 group-hover:text-gray-900">顯示虛線包絡線</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox" id="isAnimated" class="sr-only peer">
                            <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:bg-green-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5 relative"></div>
                            <span class="ml-3 text-sm text-gray-600 group-hover:text-gray-900">動態振動模擬</span>
                        </label>
                    </div>

                    <button id="downloadBtn" class="w-full bg-slate-800 hover:bg-black text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-md mt-4 flex items-center justify-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        下載圖片 (PNG)
                    </button>
                </div>
            </aside>

            <main class="lg:col-span-3 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 canvas-container min-h-[450px]">
                    <!-- 增加寬度以容納右側標籤 -->
                    <svg id="svg-canvas" width="1000" height="400" viewBox="0 0 1000 400" class="max-w-full h-auto academic-font">
                        <defs>
                            <pattern id="diagonalHatch" width="8" height="8" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
                                <line x1="0" y1="0" x2="0" y2="8" style="stroke:black; stroke-width:3" />
                            </pattern>
                        </defs>
                        
                        <!-- 底盤 -->
                        <rect x="50" y="250" width="800" height="35" fill="white" stroke="black" stroke-width="1.5" />
                        
                        <!-- 滑輪架 -->
                        <path d="M850 250 L900 210 L900 250 Z" fill="white" stroke="black" stroke-width="1.5" />
                        <circle cx="900" cy="210" r="12" fill="white" stroke="black" stroke-width="1.5" />

                        <!-- 橋碼 X -->
                        <path id="bridgeX-tri" d="M90 250 L110 210 L130 250 Z" fill="#e5e7eb" stroke="black" stroke-width="1.5" />
                        <text id="txt-labelX" x="110" y="190" text-anchor="middle" font-style="italic" font-size="22" class="academic-font">X</text>

                        <!-- 橋碼 Y (動態位置) -->
                        <path id="bridgeY-tri" d="M680 250 L700 210 L720 250 Z" fill="#e5e7eb" stroke="black" stroke-width="1.5" />
                        <text id="txt-labelY" x="700" y="190" text-anchor="middle" font-style="italic" font-size="22" class="academic-font">Y</text>

                        <!-- 弦線與波形 -->
                        <!-- 靜態左段 -->
                        <line x1="50" y1="250" x2="110" y2="210" stroke="black" stroke-width="1.5" />
                        
                        <!-- 駐波路徑 -->
                        <path id="wave-path-main" d="" fill="none" stroke="black" stroke-width="2" stroke-linejoin="round" />
                        <path id="wave-path-dashed" d="" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,4" stroke-linejoin="round" />

                        <!-- 滑輪後的弦與重物 -->
                        <path id="string-to-pulley" d="" fill="none" stroke="black" stroke-width="1.5" />

                        <g id="weight-group">
                            <rect id="weight-rect" x="885" y="280" width="30" height="50" class="dashed-pattern" stroke="black" stroke-width="1.5" />
                            <text id="txt-labelW" x="925" y="312" font-size="22" class="academic-font">重量</text>
                        </g>
                    </svg>
                </div>
                
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex gap-3 text-sm text-indigo-900">
                    <svg class="w-5 h-5 text-indigo-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"></path></svg>
                    <div>
                        <strong>提示：</strong> 導出圖片時，畫布外的溢出內容將被裁切。我們已擴展畫布寬度至 1000px，確保「重量」標籤完整。
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const svg = document.getElementById('svg-canvas');
        const hRange = document.getElementById('harmonic');
        const bYRange = document.getElementById('bridgeY');
        const ampRange = document.getElementById('amplitude');
        const fsRange = document.getElementById('fontSize');
        
        const labelXInput = document.getElementById('labelX');
        const labelYInput = document.getElementById('labelY');
        const labelWInput = document.getElementById('labelW');
        
        const showDashedCheck = document.getElementById('showDashed');
        const isAnimatedCheck = document.getElementById('isAnimated');
        const downloadBtn = document.getElementById('downloadBtn');

        const xPos = 110; // 橋碼 X 座標
        const baseY = 210; // 弦線平衡位置
        let time = 0;
        let animationId = null;

        function updateDiagram() {
            const n = parseInt(hRange.value);
            const yPos = parseInt(bYRange.value);
            const amp = parseInt(ampRange.value);
            const fSize = parseInt(fsRange.value);
            
            document.getElementById('n-val').textContent = n;
            document.getElementById('fs-val').textContent = fSize;

            // 更新橋碼 Y
            const bYTri = document.getElementById('bridgeY-tri');
            const txtY = document.getElementById('txt-labelY');
            bYTri.setAttribute('d', `M${yPos-20} 250 L${yPos} 210 L${yPos+20} 250 Z`);
            txtY.setAttribute('x', yPos);
            txtY.textContent = labelYInput.value;
            txtY.setAttribute('font-size', fSize);

            // 更新其餘標籤
            const txtX = document.getElementById('txt-labelX');
            txtX.textContent = labelXInput.value;
            txtX.setAttribute('font-size', fSize);

            const txtW = document.getElementById('txt-labelW');
            txtW.textContent = labelWInput.value;
            txtW.setAttribute('font-size', fSize);

            const L = yPos - xPos;
            const points = 100;
            let pathMain = "";
            let pathDash = "";

            // 動態系數
            const phase = isAnimatedCheck.checked ? Math.sin(time) : 1;

            for (let i = 0; i <= points; i++) {
                const x = xPos + (i / points) * L;
                // 駐波方程: y = A * sin(n * pi * x / L)
                const offsetY = amp * phase * Math.sin((n * Math.PI * (x - xPos)) / L);
                
                const cmd = i === 0 ? "M" : "L";
                pathMain += `${cmd}${x} ${baseY + offsetY} `;
                pathDash += `${cmd}${x} ${baseY - offsetY} `;
            }

            document.getElementById('wave-path-main').setAttribute('d', pathMain);
            const dashEl = document.getElementById('wave-path-dashed');
            dashEl.setAttribute('d', pathDash);
            dashEl.style.display = showDashedCheck.checked ? "inline" : "none";

            const stringToPulley = document.getElementById('string-to-pulley');
            stringToPulley.setAttribute('d', `M${yPos} 210 L900 210 L900 280`);
        }

        function animate() {
            if (isAnimatedCheck.checked) {
                time += 0.15;
                updateDiagram();
                animationId = requestAnimationFrame(animate);
            }
        }

        [hRange, bYRange, ampRange, fsRange, labelXInput, labelYInput, labelWInput, showDashedCheck].forEach(el => {
            el.addEventListener('input', () => {
                if (!isAnimatedCheck.checked) updateDiagram();
            });
        });

        isAnimatedCheck.addEventListener('change', () => {
            if (isAnimatedCheck.checked) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
                updateDiagram();
            }
        });

        downloadBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 高清導出
            const scale = 2;
            canvas.width = svg.clientWidth * scale;
            canvas.height = svg.clientHeight * scale;
            
            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.scale(scale, scale);
                ctx.drawImage(img, 0, 0);
                
                const pngUrl = canvas.toDataURL("image/png");
                const downloadLink = document.createElement("a");
                downloadLink.href = pngUrl;
                downloadLink.download = `standing_wave_n${hRange.value}.png`;
                downloadLink.click();
                URL.revokeObjectURL(url);
            };
            img.src = url;
        });

        // 初始運行
        window.onload = updateDiagram;
    </script>
</body>
</html>
