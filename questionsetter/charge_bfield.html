<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorentz Force Diagram Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { background: white; border: 1px solid #cbd5e1; border-radius: 4px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); cursor: crosshair; }
        .control-panel { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e2e8f0; height: fit-content; }
        input[type="range"] { accent-color: #2563eb; }
        @media print {
            .no-print { display: none; }
            body { background: white; p: 0; }
            .max-w-6xl { max-width: 100%; }
            canvas { box-shadow: none; border: none; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 no-print">
            <h1 class="text-3xl font-bold text-slate-800">Lorentz Force Diagram Generator</h1>
            <p class="text-slate-600">Enhanced version with high-contrast field symbols and path controls.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Simulation/Diagram Area -->
            <div class="lg:col-span-2 flex flex-col items-center">
                <canvas id="canvas" width="600" height="600"></canvas>
                <div class="mt-4 flex flex-wrap justify-center gap-4 no-print">
                    <button id="downloadBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-semibold transition">Download PNG</button>
                    <button id="resetBtn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded font-semibold transition">Reset All</button>
                    <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded font-semibold transition">Print Layout</button>
                </div>
            </div>

            <!-- Controls -->
            <div class="control-panel no-print">
                <h2 class="text-xl font-bold mb-4 text-slate-700 border-b pb-2">Settings</h2>
                
                <div class="space-y-5">
                    <!-- Field Direction -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Magnetic Field Direction (B)</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="fieldDir" value="in" checked> Into Page (×)
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="fieldDir" value="out"> Out of Page (•)
                            </label>
                        </div>
                    </div>

                    <!-- Charge -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1 text-xs uppercase tracking-wider text-slate-500 font-bold">Charge Sign</label>
                        <select id="chargeType" class="w-full border rounded p-2 bg-slate-50">
                            <option value="positive">Positive (q > 0)</option>
                            <option value="negative">Negative (q < 0)</option>
                            <option value="neutral">Neutral (q = 0)</option>
                        </select>
                    </div>

                    <!-- Radius (Momentum) -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Curvature Radius ($r$)</label>
                        <input type="range" id="radiusSlider" min="100" max="1000" value="440" class="w-full">
                        <div class="flex justify-between text-[10px] text-slate-400 font-mono">
                            <span>SMALL (STRONG B)</span>
                            <span>LARGE (WEAK B)</span>
                        </div>
                    </div>

                    <!-- Path Length -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Path Length (Coverage)</label>
                        <input type="range" id="lengthSlider" min="0.1" max="2.0" step="0.05" value="1.0" class="w-full">
                        <div class="flex justify-between text-[10px] text-slate-400 font-mono">
                            <span>SHORT</span>
                            <span>LONG</span>
                        </div>
                    </div>

                    <!-- Labeling -->
                    <div class="space-y-2 pt-2 border-t">
                        <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                            <input type="checkbox" id="showLabels" checked> Show Corner Labels (A,B,C,D)
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                            <input type="checkbox" id="showFieldText" checked> Show Description Text
                        </label>
                        <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                            <input type="checkbox" id="showPointP" checked> Show Point P
                        </label>
                    </div>

                    <!-- Text Input -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Custom Text</label>
                        <textarea id="fieldText" rows="2" class="w-full border rounded p-2 text-sm font-serif">匀強磁場 (Uniform B-field)</textarea>
                    </div>
                </div>
            </div>
        </div>

        <section class="mt-8 p-4 bg-slate-100 border rounded text-xs text-slate-600 no-print">
            <strong>Drawing Standard:</strong> Field symbols are enlarged for high-contrast printing. For "Out", a large solid dot is used. For "In", a bold cross is used.
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const state = {
            margin: 80,
            size: 440,
            radius: 440,
            pathLengthFactor: 1.0,
            chargeType: 'positive',
            fieldDir: 'in', 
            showLabels: true,
            showFieldText: true,
            showPointP: true,
            fieldText: ""
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const { margin, size } = state;
            const A = { x: margin, y: margin };
            const B = { x: margin + size, y: margin };
            const C = { x: margin + size, y: margin + size };
            const D = { x: margin, y: margin + size };

            // 1. Draw Field Area
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.2;
            ctx.strokeRect(A.x, A.y, size, size);
            ctx.setLineDash([]);

            // 2. Draw B-Field Symbols (Increased size and removed circle)
            const gap = 55;
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let x = A.x + 27; x < B.x; x += gap) {
                for (let y = A.y + 27; y < D.y; y += gap) {
                    if (state.fieldDir === 'in') {
                        // Bold Large Cross
                        ctx.font = 'bold 24px Arial';
                        ctx.fillText('×', x, y);
                    } else {
                        // Large Solid Dot
                        ctx.beginPath();
                        ctx.arc(x, y, 6, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // 3. Trajectory Logic
            const r = state.radius;
            const isNeutral = state.chargeType === 'neutral';
            
            // Start Path
            ctx.beginPath();
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.moveTo(10, A.y);
            ctx.lineTo(A.x, A.y);

            if (isNeutral) {
                const endX = A.x + (size * state.pathLengthFactor);
                ctx.lineTo(endX, A.y);
                ctx.stroke();
                drawArrow(endX - 10, A.y, endX, A.y);
            } else {
                const isPositive = state.chargeType === 'positive';
                const fieldIn = state.fieldDir === 'in';
                
                // Logic check:
                // Field In + Pos Q = Force Down
                // Field Out + Pos Q = Force Up
                const curveDown = (fieldIn && isPositive) || (!fieldIn && !isPositive);
                
                const ox = A.x;
                const oy = curveDown ? A.y + r : A.y - r;
                const startAngle = curveDown ? -Math.PI/2 : Math.PI/2;
                
                const maxBoxTheta = size / r;
                const theta = maxBoxTheta * state.pathLengthFactor;
                const endAngle = curveDown ? startAngle + theta : startAngle - theta;
                
                ctx.arc(ox, oy, r, startAngle, endAngle, !curveDown);
                ctx.stroke();

                // End Point
                const finalX = ox + r * Math.sin(theta);
                const finalY = curveDown ? oy - r * Math.cos(theta) : oy + r * Math.cos(theta);
                
                const tx = Math.cos(theta);
                const ty = curveDown ? Math.sin(theta) : -Math.sin(theta);
                drawArrow(finalX, finalY, finalX + tx * 35, finalY + ty * 35);

                // Point P
                if (state.showPointP) {
                    const midTheta = theta / 2;
                    const px = ox + r * Math.sin(midTheta);
                    const py = curveDown ? oy - r * Math.cos(midTheta) : oy + r * Math.cos(midTheta);
                    ctx.beginPath();
                    ctx.arc(px, py, 6, 0, Math.PI * 2);
                    ctx.fillStyle = 'black';
                    ctx.fill();
                    ctx.font = 'italic bold 22px serif';
                    ctx.fillText('P', px + 18, py - 12);
                }
            }

            // 4. Entrance Particle
            ctx.beginPath();
            ctx.arc(20, A.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = 'black';
            ctx.fill();
            drawArrow(30, A.y, 65, A.y);

            // 5. Labels
            if (state.showLabels) {
                ctx.font = 'italic bold 24px serif';
                ctx.fillStyle = 'black';
                ctx.textAlign = 'center';
                ctx.fillText('A', A.x - 15, A.y - 15);
                ctx.fillText('B', B.x + 15, B.y - 15);
                ctx.fillText('C', C.x + 15, C.y + 25);
                ctx.fillText('D', D.x - 15, D.y + 25);
            }

            // 6. Text Annotation
            if (state.showFieldText) {
                ctx.textAlign = 'left';
                ctx.font = '20px serif';
                const lines = state.fieldText.split('\n');
                lines.forEach((line, i) => {
                    ctx.fillText(line, B.x + 45, B.y + (size/2) + (i * 30));
                });
                
                ctx.beginPath();
                ctx.moveTo(B.x + 40, B.y + (size/2));
                ctx.lineTo(B.x - 40, B.y + (size/2));
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function drawArrow(x1, y1, x2, y2) {
            const headlen = 14;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = 'black';
            ctx.fill();
        }

        // UI Listeners
        const radiusSlider = document.getElementById('radiusSlider');
        const lengthSlider = document.getElementById('lengthSlider');
        const fieldDirRadios = document.getElementsByName('fieldDir');

        radiusSlider.addEventListener('input', (e) => { state.radius = parseInt(e.target.value); draw(); });
        lengthSlider.addEventListener('input', (e) => { state.pathLengthFactor = parseFloat(e.target.value); draw(); });
        
        fieldDirRadios.forEach(r => {
            r.addEventListener('change', (e) => { state.fieldDir = e.target.value; draw(); });
        });

        document.getElementById('chargeType').addEventListener('change', (e) => { state.chargeType = e.target.value; draw(); });
        document.getElementById('showLabels').addEventListener('change', (e) => { state.showLabels = e.target.checked; draw(); });
        document.getElementById('showFieldText').addEventListener('change', (e) => { state.showFieldText = e.target.checked; draw(); });
        document.getElementById('showPointP').addEventListener('change', (e) => { state.showPointP = e.target.checked; draw(); });
        document.getElementById('fieldText').addEventListener('input', (e) => { state.fieldText = e.target.value; draw(); });

        document.getElementById('resetBtn').addEventListener('click', () => {
            state.radius = 440;
            state.pathLengthFactor = 1.0;
            radiusSlider.value = 440;
            lengthSlider.value = 1.0;
            draw();
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'physics-diagram.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        state.fieldText = document.getElementById('fieldText').value;
        draw();
    </script>
</body>
</html>
