<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fundamental Exercise - Lumina Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 保持原有的 UI 視覺設計與動畫 */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        :root {
            --mint-deep: #064e3b;
            --mint-primary: #10b981;
            --mint-bg: #f0fdf4;
            --anim-os: 1.2s cubic-bezier(0.25, 1, 0.3, 1);
            --anim-slow: 1.6s cubic-bezier(0.4, 0, 0.2, 1);
            --tab-anim: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html, body {
            height: 100dvh;
            width: 100%; margin: 0; overflow: hidden; position: fixed;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .hero-full { position: absolute; inset: 0; width: 100%; height: 100dvh; overflow: hidden; z-index: 100; }
        #hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: saturate(1.2) brightness(1.05); transition: transform var(--anim-slow), filter 0.8s; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%); z-index: 5; }
        .hero-glass-panel { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 40px; padding: 3.5rem 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); max-width: 90%; width: 540px; display: flex; flex-direction: column; align-items: center; transition: opacity var(--anim-os), transform var(--anim-os); z-index: 20; }
        .hero-content-wrapper { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 20; padding-top: env(safe-area-inset-top); }
        .fade-exit-up { opacity: 0; transform: translateY(-150px) scale(0.9); visibility: hidden; }

        /* Security UI Elements */
        .auth-input { width: 100%; background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; outline: none; font-size: 14px; transition: 0.3s; color: #1e293b; }
        .auth-input:focus { background: rgba(255, 255, 255, 0.6); border-color: #10b981; }
        .error-msg { color: #ef4444; font-size: 11px; font-weight: bold; margin-bottom: 10px; display: none; }
        
        /* Auth Loading Indicator */
        #auth-loading { display: none; align-items: center; gap: 8px; margin-top: 15px; color: #10b981; font-size: 10px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; }

        /* Window & LMS Layouts */
        .modal-window { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #fff; transform: translateY(110vh); z-index: 310; display: none; opacity: 0; overflow: hidden; transition: opacity var(--anim-os), transform var(--anim-os); }
        .modal-window.open { display: flex; flex-direction: column; opacity: 1; transform: translateY(0); }
        .window-header { padding: 0 12px; display: flex; align-items: center; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; height: 54px; gap: 8px; flex-shrink: 0; padding-top: env(safe-area-inset-top); box-sizing: content-box; }
        .tab-strip { display: flex; align-items: flex-end; gap: 4px; flex: 1; overflow-x: auto; height: 100%; scrollbar-width: none; }
        .browser-tab { height: 38px; min-width: 100px; max-width: 180px; background: #e2e8f0; border-radius: 12px 12px 0 0; display: flex; align-items: center; padding: 0 15px; gap: 8px; cursor: pointer; transition: all var(--tab-anim); position: relative; margin-bottom: -1px; border: 1px solid transparent; }
        .browser-tab.active { background: #fff; z-index: 2; transform: scale(1.02); box-shadow: 0 -4px 10px rgba(0,0,0,0.03); }
        .tab-title { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #475569; }
        .tab-close { font-size: 10px; opacity: 0.4; padding: 4px; transition: 0.2s; }
        .window-body { flex: 1; width: 100%; background: #f8fafc; position: relative; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .win-content-page { display: none; width: 100%; height: 100%; opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .win-content-page.active { display: block; opacity: 1; transform: translateY(0); }
        .toolbar-item { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 14px; transition: 0.3s; cursor: pointer; }

        /* LMS Elements */
        .lms-classic-layout { display: flex; height: 100%; width: 100%; overflow: hidden; background: #fff; }
        .lms-sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid #eee; background: #fff; overflow-y: auto; display: flex; flex-direction: column; }
        .lms-sidebar-header { padding: 24px; border-bottom: 1px solid #f1f5f9; }
        .lms-section-title { padding: 12px 24px; background: #f8fafc; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; border-bottom: 1px solid #f1f5f9; }
        .lms-item-link { padding: 16px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f8fafc; position: relative; }
        .lms-item-link.active { background: #ecfdf5; color: #059669; }
        .lms-item-link.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #10b981; }
        .lms-item-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #f1f5f9; }
        .lms-item-link.active .lms-item-icon { background: #10b981; color: white; }
        .lms-stage { flex: 1; background: #fff; overflow-y: auto; display: flex; flex-direction: column; }
        .lms-stage-content { max-width: 1100px; margin: 0 auto; width: 100%; padding: 40px; }
        .media-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .lms-stage-title { font-size: 28px; font-weight: 800; color: #1e293b; margin-bottom: 8px; }

        /* Grid & Cards */
        .catalog-container { position: relative; width: 100%; height: 100%; overflow-y: auto; }
        /* 背景圖片刷淡處理 */
        .page-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.15; pointer-events: none; z-index: 0; }
        .lms-grid { position: relative; z-index: 10; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 40px; background: transparent; }
        .lms-card { position: relative; height: 200px; border-radius: 25px; overflow: hidden; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); background: #fff; }
        .lms-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); }
        .lms-card-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .lms-card:hover .lms-card-bg { transform: scale(1.05); }
        .lms-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; color: white; }

        /* Loader */
        #page-loader { position: fixed; inset: 0; background-color: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sync-spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Version Selector */
        .version-selector-container { position: relative; height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; background: transparent; }
        .version-card { position: relative; z-index: 10; background: #fff; border-radius: 30px; padding: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .version-btn { width: 100%; padding: 18px; margin-top: 12px; border-radius: 16px; background: #f8fafc; border: 1px solid #f1f5f9; font-weight: 700; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; cursor: pointer; color: #1e293b; }
        .version-btn:hover { background: #10b981; color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16,185,129,0.2); }
        .version-btn .badge { font-size: 10px; padding: 2px 8px; border-radius: 100px; background: rgba(0,0,0,0.05); }

        @media (max-width: 768px) {
            .lms-classic-layout { flex-direction: column; }
            .lms-sidebar { width: 100%; height: 100%; border-right: none; border-bottom: 1px solid #eee; }
            .lms-sidebar.collapsed-mobile { height: 60px; overflow: hidden; }
            .lms-stage-content { padding: 20px; }
            .mobile-back-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #f1f5f9; color: #475569; border-radius: 12px; font-size: 11px; font-weight: 800; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="page-loader">
        <img src="https://phyuaaphysics.github.io/phyustudio/appicon.png" class="w-16 h-16 mb-4">
        <p class="text-xs tracking-[0.2em] text-gray-400 font-medium uppercase animate-pulse">Initializing Gatekeeper...</p>
    </div>

    <div id="main-browser-window" class="modal-window">
        <div class="window-header">
            <div id="browser-tab-strip" class="tab-strip"></div>
            <div class="flex items-center gap-3 px-4">
                <div class="toolbar-item" onclick="manualRefresh()"><i id="window-cloud-icon" class="fas fa-cloud"></i></div>
                <div class="toolbar-item" id="sidebar-toggle-btn" style="display: none;" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="toolbar-item" onclick="openHomeFolder()"><i class="fas fa-th-list"></i></div>
                <div class="toolbar-item" onclick="closeAllTabs()"><i class="fas fa-times"></i></div>
            </div>
        </div>
        <div id="browser-window-body" class="window-body"></div>
    </div>

    <section class="hero-full">
        <img id="hero-bg" src="">
        <div class="hero-overlay"></div>
        <div class="hero-content-wrapper">
            <div id="hero-main-content" class="hero-glass-panel">
                <img src="https://phyuaaphysics.github.io/phyustudio/appicon.png" class="h-14 w-14 mb-6">
                <h1 id="hero-title" class="text-3xl tracking-[0.3em] uppercase mb-2" style="font-family: 'Cinzel', serif;">Lumina</h1>
                <p id="hero-subtitle" class="text-xl font-bold tracking-[1em] mb-8 uppercase opacity-80"></p>
                <div class="w-full mb-2">
                    <input type="text" id="auth-username" class="auth-input" placeholder="USERNAME">
                    <input type="password" id="auth-password" class="auth-input" placeholder="PASSWORD">
                    <div id="auth-error" class="error-msg text-center">Unauthorized Access</div>
                </div>
                <button id="btn-start" onclick="handleAuth()" class="px-12 py-4 rounded-full text-[10px] tracking-[0.5em] font-black uppercase bg-white/20 backdrop-blur-md border border-white/40 shadow-xl active:scale-95 transition-all">
                    START LEARNING
                </button>
                <div id="auth-loading">
                    <i class="fas fa-spinner sync-spinning"></i>
                    <span>Verifying Identity...</span>
                </div>
                <button onclick="manualRefresh()" class="mt-8 text-emerald-600/60 hover:text-emerald-600 transition-colors">
                    <i id="hero-cloud-icon" class="fas fa-cloud"></i>
                </button>
            </div>
        </div>
    </section>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7tpjyEH-gwzBdBjbitfxN4chAF-hm7JAk79ySE_kiywi2uR5m4KQQ9r7oxN0nt8A/exec';
        let openTabs = [];
        let activeTabId = null;
        let courseList = [];
        let catalogBgUrl = ""; 

        async function loadSheetData(isManual = false) {
            const heroCloudIcon = document.getElementById('hero-cloud-icon');
            const windowCloudIcon = document.getElementById('window-cloud-icon');
            const spinClasses = 'fas fa-spinner sync-spinning';
            if (isManual) {
                if(heroCloudIcon) heroCloudIcon.className = spinClasses;
                if(windowCloudIcon) windowCloudIcon.className = spinClasses;
            }
            
            try {
                const response = await fetch(`${GAS_URL}?action=getLand`);
                const result = await response.json();
                
                if (result.result === 'success') {
                    const rows = result.data;
                    courseList = [];
                    
                    rows.forEach(row => {
                        if (row[0] === 'HEROSECTION') {
                            if (row[1] === 'CONTENT_1') document.getElementById('hero-title').innerText = row[4];
                            if (row[1] === 'CONTENT_2') document.getElementById('hero-subtitle').innerText = row[4];
                            if (row[1] === 'PHOTO') document.getElementById('hero-bg').src = row[4];
                        }
                        if (row[0] === 'CATALOG_BG') {
                            catalogBgUrl = row[4];
                        }
                        if (row[0] && row[0].toString().startsWith('TOPIC')) {
                            courseList.push({ id: row[0], title: row[1], image: row[4] });
                        }
                    });
                    localStorage.setItem('LUMINA_DATA', JSON.stringify(courseList));
                    if (isManual) refreshCurrentView();
                    setStatusIcon(true);
                } else {
                    throw new Error("API Failure");
                }
            } catch (e) { 
                console.error("Sync Failed:", e);
                setStatusIcon(false);
            } finally {
                document.getElementById('page-loader').style.opacity = '0';
                setTimeout(() => { document.getElementById('page-loader').style.display = 'none'; }, 800);
            }
        }

        async function handleAuth() {
            const user = document.getElementById('auth-username').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            const errorEl = document.getElementById('auth-error');
            const startBtn = document.getElementById('btn-start');
            const loadingEl = document.getElementById('auth-loading');

            if (!user || !pass) return;
            
            // UI Feedback: Start Loading
            startBtn.innerText = "WAITING...";
            startBtn.disabled = true;
            errorEl.style.display = 'none';
            loadingEl.style.display = 'flex';

            try {
                const loginRes = await fetch(`${GAS_URL}?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
                const loginData = await loginRes.json();

                if (loginData.result === 'success') {
                    openHomeFolder();
                } else {
                    throw new Error("Invalid");
                }
            } catch (e) {
                errorEl.style.display = 'block';
                document.getElementById('hero-main-content').animate([
                    { transform: 'translateX(0px)' }, { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' }, { transform: 'translateX(0px)' }
                ], { duration: 300 });
            } finally {
                startBtn.innerText = "START LEARNING";
                startBtn.disabled = false;
                loadingEl.style.display = 'none';
            }
        }

        function openHomeFolder() { openTab("Course Catalog", "FOLDER"); }

        function openTab(title, type, topicId = null) {
            const id = topicId || `TAB_${title.replace(/\s/g, '_')}`;
            if (openTabs.find(t => t.id === id)) { switchTab(id); return; }
            const tab = { id, title, type, topicId };
            openTabs.push(tab);

            const page = document.createElement('div');
            page.id = `page-${id}`;
            page.className = 'win-content-page';
            page.innerHTML = `<div id="canvas-${id}" class="h-full w-full"></div>`;
            document.getElementById('browser-window-body').appendChild(page);
            if (type === 'FOLDER') renderGrid(`canvas-${id}`);
            else renderVersionSelector(topicId, title, `canvas-${id}`);

            switchTab(id);
            document.getElementById('hero-main-content').classList.add('fade-exit-up');
            document.getElementById('main-browser-window').style.display = 'flex';
            setTimeout(() => document.getElementById('main-browser-window').classList.add('open'), 50);
        }

        function switchTab(id) {
            activeTabId = id;
            document.querySelectorAll('.win-content-page').forEach(p => {
                if (p.id === `page-${id}`) {
                    p.style.display = 'block';
                    setTimeout(() => p.classList.add('active'), 10);
                } else {
                    p.classList.remove('active');
                    setTimeout(() => { if (!p.classList.contains('active')) p.style.display = 'none'; }, 500);
                }
            });
            const currentTab = openTabs.find(t => t.id === id);
            const toggleBtn = document.getElementById('sidebar-toggle-btn');
            toggleBtn.style.display = (currentTab && (currentTab.type === 'SELECTOR' || currentTab.type === 'FOLDER')) ? 'none' : 'flex';
            renderTabs();
        }

        function renderGrid(cid) {
            let bgHtml = catalogBgUrl ? `<img src="${catalogBgUrl}" class="page-bg-img">` : '';
            let html = `<div class="catalog-container">${bgHtml}<div class="lms-grid">`;
            courseList.forEach(c => {
                html += `<div class="lms-card" onclick="openTab('${c.title}', 'SELECTOR', '${c.id}')">
                    <img src="${c.image}" class="lms-card-bg">
                    <div class="lms-card-overlay">
                        <span class="text-[9px] font-black tracking-widest opacity-60">${c.id}</span>
                        <h3 class="font-bold text-lg">${c.title}</h3>
                    </div>
                </div>`;
            });
            document.getElementById(cid).innerHTML = html + `</div></div>`;
        }

        async function renderVersionSelector(tid, title, cid) {
            const container = document.getElementById(cid);
            container.innerHTML = `<div class="flex items-center justify-center h-full opacity-30 animate-pulse text-xs uppercase tracking-widest">Identifying Options...</div>`;
            
            // 獲取該課題的圖片作為背景
            const course = courseList.find(c => c.id === tid);
            const bgImgUrl = course ? course.image : '';
            const bgHtml = bgImgUrl ? `<img src="${bgImgUrl}" class="page-bg-img">` : '';

            try {
                const res = await fetch(`${GAS_URL}?action=getTopic&topicId=${tid}`);
                const result = await res.json();
                const rows = result.data;
                const versions = [...new Set(rows.slice(1).map(r => r[0]).filter(v => v && v !== 'VERSION'))].sort();
                let versionBtns = '';
                versions.forEach(v => {
                    versionBtns += `<div class="version-btn" onclick="renderLMS('${tid}', '${title}', '${cid}', '${v}')">
                        <span>${v}</span><span class="badge">Open</span>
                    </div>`;
                });
                container.innerHTML = `<div class="version-selector-container">
                    ${bgHtml}
                    <div class="version-card">
                        <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fas fa-layer-group"></i></div>
                        <h2 class="text-xl font-black text-slate-800 mb-2">${title}</h2>
                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-8">Please Select to Continue</p>
                        <div class="space-y-3">${versionBtns}</div>
                        <button onclick="renderGrid('${cid}')" class="mt-8 text-[10px] font-bold text-slate-300 uppercase hover:text-slate-500 transition-colors">Back to Catalog</button>
                    </div>
                </div>`;
            } catch (e) { container.innerHTML = `<div class="p-20 text-center text-xs opacity-40">COULD NOT LOCATE MODULE: ${tid}</div>`; }
        }

        async function renderLMS(tid, title, cid, vFilter) {
            const container = document.getElementById(cid);
            container.innerHTML = `<div class="flex items-center justify-center h-full opacity-30 animate-pulse text-xs uppercase tracking-widest">Configuring ${vFilter}...</div>`;
            try {
                const res = await fetch(`${GAS_URL}?action=getTopic&topicId=${tid}`);
                const result = await res.json();
                const rows = result.data;
                const sections = {};
                rows.forEach((r, i) => {
                    if (i === 0 || !r[1] || r[0] === 'VERSION' || (vFilter && r[0] !== vFilter)) return;
                    if (!sections[r[1]]) sections[r[1]] = [];
                    sections[r[1]].push({ version: r[0], topic: r[3], type: r[4].toLowerCase(), content: r[5] });
                });

                let sidebarHtml = '';
                let firstItem = null;
                for (const sec in sections) {
                    sidebarHtml += `<div class="lms-section-title">${sec}</div>`;
                    sections[sec].forEach((item, idx) => {
                        const itemId = `item_${tid}_${sec.replace(/\s/g, '')}_${idx}`;
                        if (!firstItem) firstItem = { ...item, id: itemId, section: sec };
                        sidebarHtml += `<div id="btn-${itemId}" class="lms-item-link" onclick="updateLMSStage('${tid}', '${sec}', '${item.topic}', '${item.type}', '${item.content}', '${itemId}')">
                            <div class="lms-item-icon"><i class="fas ${item.type === 'video' ? 'fa-play' : 'fa-file-alt'}"></i></div>
                            <div class="flex-1">
                                <div class="text-[13px] font-bold leading-tight">${item.topic}</div>
                                <div class="text-[9px] opacity-40 uppercase font-black mt-1">${item.type}</div>
                            </div>
                        </div>`;
                    });
                }
                container.innerHTML = `<div class="lms-classic-layout">
                    <div class="lms-sidebar" id="sidebar-${tid}">
                        <div class="lms-sidebar-header">
                            <div class="flex justify-between items-center mb-1">
                                <div class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${tid}</div>
                                <div class="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-400 font-black">${vFilter}</div>
                            </div>
                            <div class="text-lg font-black text-slate-800">${title}</div>
                        </div>
                        <div class="flex-1">${sidebarHtml}</div>
                        <div class="p-4 border-t">
                            <button onclick="renderVersionSelector('${tid}', '${title}', '${cid}')" class="w-full py-2 text-[10px] font-black text-slate-400 uppercase bg-slate-50 rounded-lg">Switch Selection</button>
                        </div>
                    </div>
                    <div class="lms-stage" id="stage-${tid}"></div>
                </div>`;
                if (firstItem) updateLMSStage(tid, firstItem.section, firstItem.topic, firstItem.type, firstItem.content, firstItem.id, true);
            } catch (e) { container.innerHTML = `<div class="p-20 text-center text-xs opacity-40">ERROR LOADING COURSE: ${tid}</div>`; }
        }

        function setStatusIcon(success) {
            const h = document.getElementById('hero-cloud-icon');
            const w = document.getElementById('window-cloud-icon');
            const cls = success ? 'fas fa-check' : 'fas fa-times';
            const col = success ? '#10b981' : '#ef4444';
            if(h) { h.className = cls; h.style.color = col; }
            if(w) { w.className = cls; w.style.color = col; }
            setTimeout(() => {
                if(h) { h.className = 'fas fa-cloud'; h.style.color = ""; }
                if(w) { w.className = 'fas fa-cloud'; w.style.color = ""; }
            }, 2000);
        }

        function toggleSidebar(forceShow = false) { 
            const activePage = document.querySelector('.win-content-page.active');
            if (!activePage) return;
            const sidebar = activePage.querySelector('.lms-sidebar');
            if (sidebar) {
                if (forceShow) sidebar.classList.remove('collapsed-mobile');
                else sidebar.classList.toggle('collapsed-mobile');
            }
        }

        function renderTabs() {
            const strip = document.getElementById('browser-tab-strip');
            strip.innerHTML = '';
            openTabs.forEach(t => {
                const el = document.createElement('div');
                el.className = `browser-tab ${activeTabId === t.id ? 'active' : ''}`;
                el.onclick = () => switchTab(t.id);
                el.innerHTML = `<i class="fas ${t.type === 'FOLDER' ? 'fa-th' : 'fa-play'} text-[10px] text-emerald-500"></i>
                    <span class="tab-title">${t.title}</span>
                    <i class="fas fa-times tab-close" onclick="event.stopPropagation(); closeTab('${t.id}')"></i>`;
                strip.appendChild(el);
            });
        }

        function closeTab(id) {
            const idx = openTabs.findIndex(t => t.id === id);
            const targetPage = document.getElementById(`page-${id}`);
            if (targetPage) {
                targetPage.classList.remove('active');
                setTimeout(() => targetPage.remove(), 500);
            }
            openTabs.splice(idx, 1);
            if (openTabs.length === 0) closeAllTabs();
            else switchTab(openTabs[Math.max(0, idx - 1)].id);
        }

        function closeAllTabs() {
            openTabs = [];
            activeTabId = null;
            document.getElementById('main-browser-window').classList.remove('open');
            document.getElementById('hero-main-content').classList.remove('fade-exit-up');
            setTimeout(() => {
                document.getElementById('main-browser-window').style.display = 'none';
                document.getElementById('browser-window-body').innerHTML = '';
            }, 800);
        }

        function updateLMSStage(tid, section, topic, type, content, itemId, isInitialLoad = false) {
            const stage = document.getElementById(`stage-${tid}`);
            document.querySelectorAll(`.lms-item-link`).forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${itemId}`);
            if (activeBtn) activeBtn.classList.add('active');
            if (window.innerWidth <= 768 && !isInitialLoad) {
                const sidebar = document.getElementById(`sidebar-${tid}`);
                if (sidebar) sidebar.classList.add('collapsed-mobile');
            }

            let mediaHtml = '';
            let externalButton = '';
            if (type === 'video') {
                const vidId = extractYoutubeId(content);
                mediaHtml = `<div class="media-box"><iframe src="https://www.youtube.com/embed/${vidId}?autoplay=${isInitialLoad ? '0' : '1'}" class="w-full h-full" frameborder="0" allow="autoplay; fullscreen"></iframe></div>`;
                externalButton = `<button onclick="window.open('${content}', '_blank')" class="px-3 py-1 rounded bg-slate-100 text-slate-600 hover:bg-emerald-500 hover:text-white transition-all text-[11px] font-black flex items-center gap-1.5"><i class="fas fa-mobile-alt"></i> OPEN IN APP</button>`;
            } else {
                mediaHtml = `<div class="media-box bg-white"><img src="${content}" class="w-full h-full object-contain"></div>`;
            }

            stage.innerHTML = `<div class="lms-stage-content">
                <button class="mobile-back-btn" onclick="toggleSidebar(true)"><i class="fas fa-chevron-left"></i> 返回資源選單</button>
                ${mediaHtml}
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-black bg-slate-100 px-2 py-0.5 rounded text-slate-500 uppercase">${section}</span>
                        <span class="text-[10px] font-black bg-emerald-100 px-2 py-0.5 rounded text-emerald-600 uppercase">${type}</span>
                    </div>
                    ${externalButton}
                </div>
                <h2 class="lms-stage-title">${topic}</h2>
                <p class="lms-stage-subtitle">Focus on the key concepts presented in this session.</p>
            </div>`;
            stage.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function extractYoutubeId(url) { 
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); 
            return (match && match[2].length === 11) ? match[2] : null; 
        }
        function manualRefresh() { loadSheetData(true); }
        function refreshCurrentView() { openTabs.forEach(tab => { if (tab.type === 'FOLDER') renderGrid(`canvas-${tab.id}`); }); }
        
        window.onload = () => loadSheetData(false);
    </script>
</body>
</html>
